<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>True Balance Trader</title>
<style>
:root{
  --bg:#0a0c0f; --panel:#14191f; --panel2:#1a2127; --line:#28323d; --line-soft:#1e262e;
  --ink:#eaeff4; --dim:#8a98a5; --faint:#5a6772;
  --amber:#e8aa42; --amber-d:#a8782a; --amber-glow:rgba(232,170,66,.14);
  --green:#3ec77b; --green-d:#1f7a4a;
  --red:#e0533b; --red-d:#9a3525;
  --blue:#4a90d9; --violet:#9a7bd0;
  --mono:'SF Mono',ui-monospace,'Cascadia Mono','Roboto Mono',Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,system-ui,sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.25);
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%}
body{
  padding-bottom:80px;
  background:
    radial-gradient(1200px 600px at 50% -5%, rgba(232,170,66,.05), transparent 60%),
    radial-gradient(900px 500px at 100% 100%, rgba(74,144,217,.04), transparent 55%),
    var(--bg);
  background-attachment:fixed;
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
h1,h2,h3,h4{font-weight:650;letter-spacing:-0.015em;line-height:1.2}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
.dim{color:var(--dim)}.faint{color:var(--faint)}
.pos{color:var(--green)}.neg{color:var(--red)}.amber{color:var(--amber)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:10px 12px;width:100%;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-glow)}
label{display:block;font-size:11px;color:var(--dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700}


/* Top bar + session ribbon */
.topbar{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,rgba(10,12,15,.98) 0%,rgba(10,12,15,.92) 100%);backdrop-filter:blur(14px) saturate(1.3);-webkit-backdrop-filter:blur(14px) saturate(1.3);border-bottom:1px solid var(--line-soft);box-shadow:0 1px 0 rgba(255,255,255,.02)}
.brand{display:flex;align-items:center;gap:11px;padding:13px 16px 9px}
.brand .logo{width:32px;height:32px;flex:none;filter:drop-shadow(0 0 8px rgba(232,170,66,.25))}
.brand .t{font-size:16px;font-weight:750;letter-spacing:-0.025em}
.brand .t span{color:var(--amber)}
.brand .clock{margin-left:auto;text-align:right}
.brand .clock .utc{font-family:var(--mono);font-size:15px;font-weight:650;letter-spacing:0.02em}
.brand .clock .lbl{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:0.14em}

/* Session ribbon */
.ribbon{display:flex;height:32px;border-top:1px solid var(--line-soft);position:relative;overflow:hidden}
.ribbon .seg{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;font-size:10px;text-transform:uppercase;letter-spacing:0.12em;font-weight:600;color:var(--faint);border-right:1px solid var(--line-soft);position:relative;transition:all .5s cubic-bezier(.4,0,.2,1)}
.ribbon .seg:last-child{border-right:none}
.ribbon .seg.active{color:#0a0c0f;font-weight:750;text-shadow:0 1px 0 rgba(255,255,255,.15)}
.ribbon .seg.active.asia{background:linear-gradient(180deg,#5ba0e0,var(--blue))}
.ribbon .seg.active.london{background:linear-gradient(180deg,#f0b556,var(--amber))}
.ribbon .seg.active.ny{background:linear-gradient(180deg,#4dd68a,var(--green))}
.ribbon .seg.kz::after{content:'KZ';position:absolute;top:3px;right:5px;font-size:8px;color:var(--amber);font-weight:700}
.ribbon .seg.active.kz::after{color:#0a0c0f}

/* Tabs */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:60;background:linear-gradient(180deg,rgba(20,25,31,.85),rgba(14,17,21,.97));backdrop-filter:blur(16px) saturate(1.3);-webkit-backdrop-filter:blur(16px) saturate(1.3);border-top:1px solid var(--line-soft);display:flex;overflow-x:auto;scrollbar-width:none;padding-bottom:env(safe-area-inset-bottom,0)}
.tabbar::-webkit-scrollbar{display:none}
.tabbar button{flex:1 0 auto;min-width:62px;padding:9px 8px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);font-size:10px;font-weight:600;border-top:2px solid transparent;transition:color .2s,transform .1s}
.tabbar button.on{color:var(--amber);border-top-color:var(--amber)}
.tabbar button.on svg{filter:drop-shadow(0 0 6px var(--amber-glow))}
.tabbar button:active{transform:scale(.92)}
.tabbar button svg{width:21px;height:21px;transition:transform .2s}

/* Layout */
.wrap{max-width:760px;margin:0 auto;padding:16px}
.view{display:none}.view.on{display:block;animation:fade .32s cubic-bezier(.2,0,.2,1)}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{background:linear-gradient(180deg,var(--panel),#11161b);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.card h3{font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:var(--dim);margin-bottom:12px;display:flex;align-items:center;gap:8px;font-weight:700}
.card h3 .tag{margin-left:auto;font-size:10px;color:var(--faint);font-weight:600;letter-spacing:0.04em;text-transform:none}
.row{display:flex;gap:10px}.row>*{flex:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.section-h{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--dim);margin:26px 4px 12px;font-weight:700;display:flex;align-items:center;gap:9px}
.section-h::before{content:'';width:3px;height:14px;background:linear-gradient(180deg,var(--amber),var(--amber-d));border-radius:2px;flex:none}

/* Buttons */
.btn{background:linear-gradient(180deg,#f0b556,var(--amber));color:#1a1206;font-weight:700;border-radius:10px;padding:12px 16px;font-size:14px;text-align:center;transition:transform .1s,box-shadow .2s,filter .15s;box-shadow:0 2px 8px rgba(232,170,66,.2)}
.btn:active{transform:scale(.97);filter:brightness(.95)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);font-weight:600;box-shadow:none}
.btn.ghost:active{background:var(--panel2)}
.btn.green{background:linear-gradient(180deg,#4dd68a,var(--green));color:#062013;box-shadow:0 2px 8px rgba(62,199,123,.2)}
.btn.red{background:linear-gradient(180deg,#ec6850,var(--red));color:#2a0a04;box-shadow:0 2px 8px rgba(224,83,59,.2)}
.btn.sm{padding:7px 12px;font-size:13px;box-shadow:none}
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;border:1px solid var(--line);background:var(--panel2);font-size:13px;color:var(--dim);cursor:pointer;user-select:none;transition:all .15s}
.chip:active{transform:scale(.95)}
.chip.on{background:linear-gradient(180deg,#f0b556,var(--amber));color:#1a1206;border-color:var(--amber);font-weight:700}
.chip.on.g{background:var(--green);color:#062013;border-color:var(--green)}
.chip.on.r{background:var(--red);color:#2a0a04;border-color:var(--red)}
.chipwrap{display:flex;flex-wrap:wrap;gap:7px}

/* Stats */
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:linear-gradient(180deg,#1c242c,#161c22);border:1px solid var(--line);border-radius:12px;padding:13px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
.stat .v{font-family:var(--mono);font-size:23px;font-weight:750;line-height:1;letter-spacing:-0.03em}
.stat .l{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:0.08em;margin-top:6px;font-weight:600}

/* Table */
.tlist{display:flex;flex-direction:column;gap:8px}
.trade{background:linear-gradient(180deg,#1b232a,#161c22);border:1px solid var(--line);border-radius:11px;padding:11px 13px;border-left:3px solid var(--faint);transition:transform .1s,border-color .2s}
.trade[onclick]:active{transform:scale(.99)}
.trade.win{border-left-color:var(--green)}.trade.loss{border-left-color:var(--red)}.trade.be{border-left-color:var(--amber)}
.trade .top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.trade .pair{font-weight:700;font-family:var(--mono);letter-spacing:-0.02em}
.trade .dir{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.trade .dir.long{background:var(--green-d);color:#bff5d6}.trade .dir.short{background:var(--red-d);color:#ffcabf}
.trade .r{margin-left:auto;font-family:var(--mono);font-weight:750;font-size:16px;letter-spacing:-0.03em}
.trade .meta{font-size:11px;color:var(--faint);display:flex;gap:10px;flex-wrap:wrap}

/* Reference cards */
.refcard{background:linear-gradient(180deg,#1b232a,#161c22);border:1px solid var(--line);border-radius:14px;padding:0;margin-bottom:12px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.refcard.open{border-color:var(--amber-d);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.refcard .head{padding:15px 16px;cursor:pointer;display:flex;align-items:center;gap:10px}
.refcard .head .n{font-weight:700;font-size:15.5px;letter-spacing:-0.01em}
.refcard .head .badge{font-size:9px;padding:3px 9px;border-radius:6px;background:var(--amber-glow);border:1px solid var(--amber-d);color:var(--amber);text-transform:uppercase;letter-spacing:0.07em;font-weight:700}
.refcard .head .arr{margin-left:auto;color:var(--faint);transition:transform .25s;font-size:18px}
.refcard.open .head .arr{transform:rotate(90deg);color:var(--amber)}
.refcard .body{display:none;padding:0 16px 18px;border-top:1px solid var(--line-soft)}
.refcard.open .body{display:block;animation:fade .3s}
.refcard .body p{font-size:14.5px;color:var(--dim);margin:13px 0;line-height:1.62}
.refcard .body .lead{color:var(--ink);font-weight:500;font-size:15px;line-height:1.6;padding:13px 14px;background:rgba(232,170,66,.05);border-radius:10px;border:1px solid rgba(232,170,66,.12);margin:14px 0}
.refcard svg{width:100%;height:auto;background:radial-gradient(circle at 50% 30%,#0d1116,#080a0d);border:1px solid var(--line);border-radius:10px;margin:12px 0;box-shadow:inset 0 1px 3px rgba(0,0,0,.4)}
.kv{display:flex;gap:11px;font-size:13.5px;padding:9px 2px;border-bottom:1px solid var(--line-soft);line-height:1.5}
.kv:last-child{border:none}
.kv b{color:var(--amber);min-width:96px;flex:none;font-weight:650}
.kv span{color:var(--dim)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tags .x{font-size:11px;padding:4px 9px;background:var(--panel);border:1px solid var(--line);border-radius:6px;color:var(--dim)}
/* deeper explanatory blocks */
.why{font-size:13.5px;color:var(--dim);background:rgba(74,144,217,.07);border-left:3px solid var(--blue);padding:11px 14px;border-radius:0 10px 10px 0;margin:12px 0;line-height:1.6}
.why b{color:#7db4ec;font-weight:650}
.eg{font-size:13.5px;color:var(--dim);background:rgba(62,199,123,.06);border-left:3px solid var(--green-d);padding:11px 14px;border-radius:0 10px 10px 0;margin:12px 0;line-height:1.6}
.eg b{color:#5dd693;font-weight:650}
.cap{font-size:11.5px;color:var(--faint);font-style:italic;margin:2px 0 10px;padding-left:10px;border-left:2px solid var(--line);line-height:1.5}
.cap b{color:var(--dim);font-style:normal;font-weight:650}

/* News */
.news-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.news-item:last-child{border:none}
.news-item .imp{width:8px;height:8px;border-radius:50%;flex:none}
.imp.high{background:var(--red)}.imp.med{background:var(--amber)}
.news-item .cc{font-family:var(--mono);font-weight:700;font-size:13px;width:34px;flex:none}
.news-item .ev{flex:1;font-size:14px}
.news-item .ev small{display:block;color:var(--faint);font-size:11px}
.news-item .tm{font-family:var(--mono);font-size:12px;color:var(--dim);text-align:right}

/* Calc result */
.result{background:linear-gradient(135deg,#1a2127,#13181d);border:1px solid var(--amber-d);border-radius:10px;padding:14px;margin-top:12px}
.result .big{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--amber)}
.result .sub{font-size:12px;color:var(--dim);margin-top:4px}

/* Checklist */
.check{display:flex;align-items:flex-start;gap:11px;padding:11px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;margin-bottom:7px;cursor:pointer}
.check .box{width:22px;height:22px;border:2px solid var(--faint);border-radius:6px;flex:none;display:flex;align-items:center;justify-content:center;margin-top:1px}
.check.done .box{background:var(--green);border-color:var(--green)}
.check.done .box svg{display:block}.check .box svg{display:none;width:14px;height:14px}
.check .txt{font-size:14px}.check.done .txt{color:var(--faint)}

.empty{text-align:center;padding:44px 20px;color:var(--faint);line-height:1.6}
.empty svg{width:44px;height:44px;opacity:.35;margin-bottom:14px;stroke:var(--amber)}
.bar{height:8px;background:var(--panel2);border-radius:5px;overflow:hidden;display:flex;box-shadow:inset 0 1px 2px rgba(0,0,0,.3)}
.bar>div{transition:width .5s cubic-bezier(.4,0,.2,1)}
.modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);display:none;align-items:flex-end}
.modal.on{display:flex;animation:fadein .2s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.sheet{background:linear-gradient(180deg,#181e25,var(--panel));border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:18px 16px calc(30px + env(safe-area-inset-bottom,0));animation:up .34s cubic-bezier(.2,0,.2,1);box-shadow:0 -8px 40px rgba(0,0,0,.5);border-top:1px solid var(--line)}
@keyframes up{from{transform:translateY(100%)}}
.sheet .grab{width:38px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 16px}
.note{font-size:12px;color:var(--dim);background:var(--panel2);border-left:3px solid var(--amber);padding:11px 13px;border-radius:0 9px 9px 0;margin:10px 0;line-height:1.55}
canvas{max-width:100%}
.chkitem{display:flex;gap:12px;align-items:flex-start;padding:12px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;cursor:pointer;transition:all .15s;background:var(--panel2)}
.chkitem.on{border-color:var(--green);background:rgba(62,199,123,.06)}
.chkitem .chkbox{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.chkitem.on .chkbox{background:var(--green);border-color:var(--green)}
.chkitem .tick{color:#062013;font-weight:800;font-size:14px;opacity:0;transition:opacity .15s}
.chkitem.on .tick{opacity:1}
.fieldcard{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:13px;margin-bottom:10px}
.fieldcard .lbl{font-size:11px;color:var(--amber);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:6px}
.ruleitem{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line-soft);cursor:pointer;transition:opacity .15s}
.ruleitem:last-child{border-bottom:none}
.ruleitem .rn{width:24px;height:24px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--faint)}
.ruleitem.on .rn{background:var(--amber);border-color:var(--amber);color:#1a1206}
.ruleitem .rt{font-size:13.5px;line-height:1.45;color:var(--dim)}
.ruleitem.on .rt{color:var(--ink)}
.ruleitem .rcheck{margin-left:auto;color:var(--green);font-weight:800;flex:none}
.result{margin-top:14px;text-align:center;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:16px}
.result .big{font-family:var(--mono);font-size:28px;font-weight:750;letter-spacing:-0.03em}
.result .sub{font-size:12px;color:var(--faint);margin-top:5px}
.result .big.pos{color:var(--green)}.result .big.neg{color:var(--red)}.result .big.amber{color:var(--amber)}

/* Boot splash */
#splash{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:radial-gradient(800px 500px at 50% 40%,rgba(232,170,66,.08),transparent 60%),var(--bg);transition:opacity .5s ease,visibility .5s}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none}
#splash .slogo{width:72px;height:72px;animation:splashpulse 2s ease-in-out infinite}
#splash .stitle{font-size:22px;font-weight:750;letter-spacing:-0.03em;opacity:0;animation:splashup .6s .2s forwards}
#splash .stitle span{color:var(--amber)}
#splash .ssub{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:0.22em;opacity:0;animation:splashup .6s .4s forwards}
#splash .sbar{width:120px;height:2px;background:var(--line);border-radius:2px;overflow:hidden;opacity:0;animation:splashup .6s .5s forwards}
#splash .sbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--amber-d),var(--amber));animation:sload 1.1s .5s cubic-bezier(.4,0,.2,1) forwards}
@keyframes splashpulse{0%,100%{filter:drop-shadow(0 0 6px rgba(232,170,66,.2))}50%{filter:drop-shadow(0 0 16px rgba(232,170,66,.45))}}
@keyframes splashup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes sload{from{width:0}to{width:100%}}
@media(prefers-reduced-motion:reduce){#splash .slogo,#splash .stitle,#splash .ssub,#splash .sbar,#splash .sbar i{animation:none;opacity:1}#splash .sbar i{width:100%}}
</style>
</head>
<body>
<div id="splash">
  <svg class="slogo" viewBox="0 0 40 40" fill="none">
    <circle cx="20" cy="20" r="18" stroke="#e8aa42" stroke-width="2"/>
    <path d="M20 6 L20 34 M6 20 L34 20" stroke="#28323d" stroke-width="1"/>
    <path d="M11 25 L17 18 L23 22 L29 11" stroke="#3ec77b" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div class="stitle">True Balance <span>Trader</span></div>
  <div class="ssub">Survival first · Profits second</div>
  <div class="sbar"><i></i></div>
</div>
<!-- content injected by app.js below -->
<div class="topbar">
  <div class="brand">
    <svg class="logo" viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="18" stroke="#e8aa42" stroke-width="2"/>
      <path d="M20 6 L20 34 M6 20 L34 20" stroke="#28323d" stroke-width="1"/>
      <path d="M11 25 L17 18 L23 22 L29 11" stroke="#3ec77b" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="t">True Balance <span>Trader</span></div>
    <div class="clock"><div class="utc mono" id="clkUtc">--:--</div><div class="lbl" id="clkLbl">UTC</div></div>
  </div>
  <div class="ribbon" id="ribbon"></div>
</div>

<div class="wrap">
  <div class="view on" id="v-journal"></div>
  <div class="view" id="v-stats"></div>
  <div class="view" id="v-plan"></div>
  <div class="view" id="v-rules"></div>
  <div class="view" id="v-edu"></div>
  <div class="view" id="v-ref"></div>
</div>

<div class="tabbar" id="tabbar"></div>
<div class="modal" id="modal"><div class="sheet" id="sheet"><div class="grab"></div><div id="sheetBody"></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js"></script>

  function tryNext(i){

/* ============ SMART MONEY MECHANICS (deep reference, researched) ============ */
const SMC=[
{n:'Liquidity Pools',badge:'Foundation',lead:'Resting orders price is engineered to reach. The fuel for every move — find the pool and you find the magnet.',
 body:`<p>Liquidity pools are concentrations of stop orders that cluster in predictable places. Institutions need them filled to move size, so price is drawn toward them.</p>
 <div class="kv"><b>Buy-side (BSL)</b><span>Above swing highs, equal highs, trendline tops — buy stops of shorts + breakout buyers</span></div>
 <div class="kv"><b>Sell-side (SSL)</b><span>Below swing lows, equal lows — sell stops of longs + breakout sellers</span></div>
 <div class="kv"><b>Strongest pools</b><span>Equal highs/lows (a clean double-top/bottom) act as the biggest magnets</span></div>
 <div class="kv"><b>Internal vs external</b><span>Internal = liquidity inside the current range; external = the prior major swing high/low</span></div>
 <div class="note">These are probabilistic zones of interest where stops likely cluster — not guarantees. Price seeks liquidity, but which pool and when is context-dependent.</div>`},
{n:'Liquidity Sweep (Grab)',badge:'Trigger',lead:'A wick beyond a pool that snaps back. The manipulation that precedes the real move — and the single most important confirmation in the model.',
 body:`<p>A sweep takes the resting orders, then price rejects. The distinction below is the whole game:</p>
 <div class="kv"><b>Wick-only sweep</b><span>A clean grab + rejection = likely reversal fuel (the high-value signal)</span></div>
 <div class="kv"><b>Body close beyond</b><span>If price closes and holds past the level, it may be a genuine break, not a grab</span></div>
 <div class="kv"><b>Why it matters</b><span>Smart money creates grabs to fill orders at concentrated stop levels before reversing</span></div>
 <div class="note">A wick-only breach suggests a simple liquidity grab — often a brief reversal, not a trend change. A decisive body close is a different event. Reading this distinction is what separates a sweep from a breakout.</div>`},
{n:'Break of Structure (BOS)',badge:'Continuation',lead:'Price breaks a swing point in the direction of the existing trend. Confirmation that the trend continues.',
 body:`<p>A BOS occurs when price breaks beyond a recent swing point <i>in the direction of the existing trend</i> — it signals continuation, not reversal.</p>
 <div class="kv"><b>Bullish BOS</b><span>Uptrend makes a new higher high, breaking the prior high</span></div>
 <div class="kv"><b>Bearish BOS</b><span>Downtrend makes a new lower low, breaking the prior low</span></div>
 <div class="kv"><b>Requires a close</b><span>A candle must CLOSE beyond the level — a wick alone is a stop hunt, not a BOS</span></div>
 <div class="kv"><b>Inducement</b><span>A "true" BOS takes out inducement (minor liquidity) first; a break without it is a minor BOS</span></div>
 <div class="note">Reliable when confirmed by candle close + retest. Unconfirmed breaks (wicks) are the #1 false signal. Trade in the direction of the BOS.</div>`},
{n:'Change of Character (CHoCH)',badge:'Reversal Warning',lead:'Price breaks structure AGAINST the trend — the first sign the trend may be weakening. An alert, not an entry.',
 body:`<p>In an uptrend (HH/HL), a CHoCH is the break of the most recent higher <i>low</i>. In a downtrend, the break of the most recent lower <i>high</i>. It's the earliest reversal cue.</p>
 <div class="kv"><b>Bullish CHoCH</b><span>Downtrend breaks above its last lower high — possible bottom</span></div>
 <div class="kv"><b>Bearish CHoCH</b><span>Uptrend breaks below its last higher low — possible top</span></div>
 <div class="kv"><b>Sequence</b><span>CHoCH (warning) → wait for displacement + BOS in the new direction (confirmation)</span></div>
 <div class="kv"><b>CHoCH+ / MSB</b><span>A stronger variant signaling a more decisive reversal</span></div>
 <div class="note">CHoCH is an alert, not a trade. Most CHoCHs resolve as pullbacks within the larger trend. Treat it as "structure is now broken — wait for clarification," and demand it occur at a HTF key level (FVG, OB, S/R). A CHoCH at a random price is unreliable.</div>`},
{n:'BOS vs CHoCH vs MSS',badge:'Disambiguation',lead:'These get conflated constantly. The precise differences, since your indicator depends on defining them exactly.',
 body:`<div class="kv"><b>BOS</b><span>Break WITH the trend = continuation</span></div>
 <div class="kv"><b>CHoCH</b><span>Break AGAINST the trend = first reversal warning</span></div>
 <div class="kv"><b>MSS</b><span>Market Structure Shift — the initial decisive counter-trend break WITH displacement; the confirmed reversal trigger</span></div>
 <div class="kv"><b>The nuance</b><span>Some define MSS as the first shift and BOS as the larger confirmed shift after inducement is taken. Camps differ — pick one definition and be consistent.</span></div>
 <div class="note">For an indicator, the ambiguity here IS the problem: "whose definition of a swing point? does a wick count? what's the inducement?" Every SMC indicator lives or dies on how rigorously these are coded. Define them numerically (e.g. swing = N bars each side, break = body close beyond) and never hand-wave.</div>`},
{n:'Order Blocks (OB)',badge:'Entry Zone',lead:'The last opposing candle before an impulsive move. The institutional footprint price often returns to — IF it meets strict validity rules.',
 body:`<p>A bullish OB is the last <i>down</i>-candle before a strong up-move; bearish OB is the last <i>up</i>-candle before a strong drop. The theory: institutions absorbed orders there, leaving residual liquidity to react to on retest.</p>
 <div class="kv"><b>Validity rule 1</b><span>The move out must create displacement (a strong, multi-bar impulsive move)</span></div>
 <div class="kv"><b>Validity rule 2</b><span>That move must break structure (cause a BOS or CHoCH)</span></div>
 <div class="kv"><b>Validity rule 3</b><span>It should leave an FVG/imbalance — "not an OB unless it has imbalance"</span></div>
 <div class="kv"><b>Mitigation</b><span>Untested OB = unmitigated (strongest). Each test fills orders and weakens it. Once price reacts, it's "mitigated."</span></div>
 <div class="kv"><b>OB vs S/D zone</b><span>An OB is a single specific candle; a supply/demand zone is the broader base. OB is the precise version.</span></div>
 <div class="why"><b>Why it works:</b> institutions can't fill a large position in one print without moving price against themselves. They absorb orders quietly in that last opposing candle, then displace. Unfilled orders may remain at that level — so when price returns, there's residual interest to defend it. The FVG requirement matters because real displacement is so aggressive it skips price levels, leaving the gap; no gap means the move wasn't truly impulsive, so the "institutional footprint" claim is weak.</div>
 <div class="eg"><b>Worked example:</b> on AUD/USD 15m, price grinds down then prints one last red candle at 0.6580 — immediately followed by three strong green candles that gap up through 0.6595 (an FVG) and break the prior swing high (BOS). That last red candle (0.6578–0.6582) is your bullish OB. Hours later price pulls back to 0.6581, taps the unmitigated block, and rallies. The entry was the OB; the stop sat just below 0.6578.</div>
 <div class="note">The last opposing candle, displacement out, structure break, and imbalance — together — separate a real OB from a random candle. A clean OB with no displacement/FVG is low probability.</div>`},
{n:'Does Price Actually React? — The Honest Data',badge:'Reliability',lead:'The core question for any indicator. The measured answer: reliability is a function of CONTEXT, not the raw pattern. This is where consistency is won or lost.',
 body:`<p>From backtests and practitioner data across SMC concepts:</p>
 <div class="kv"><b>HTF OBs (4H/D)</b><span>~60–70% rejection rate WITH proper confirmation</span></div>
 <div class="kv"><b>LTF OBs (5m/15m)</b><span>~50–60% — much noisier, more failures</span></div>
 <div class="kv"><b>OBs without confluence</b><span>~50/50 — a coin flip</span></div>
 <div class="kv"><b>With HTF context + confluence</b><span>~60–75% rejection — a measurable edge</span></div>
 <div class="kv"><b>FVG fill rate</b><span>Gaps fill roughly ~70% of the time (commonly cited)</span></div>
 <div class="note">The "80%+ win rate" marketing figures are typically cherry-picked and NOT representative. The real edge is modest and entirely context-dependent: timeframe + HTF alignment + confluence (sweep, premium/discount, FVG). "Displacement guarantees a retest" is FALSE — many strong moves don't retrace immediately; continuation is common.</div>
 <div class="note" style="border-left-color:var(--amber)">Implication for your indicator: don't chase a single magic pattern. Build it to score CONFLUENCE (how many conditions align) and FILTER by HTF context — then MEASURE its actual hit rate with the replay/backtest engine before trusting it. Consistency comes from measurement, not faith.</div>`},
{n:'Building a Consistent Edge',badge:'Synthesis',lead:'How the pieces combine into something testable — the blueprint for what you are trying to build.',
 body:`<p>The reliable sequence every source converges on:</p>
 <div class="kv"><b>1. HTF bias</b><span>Daily/4H structure sets direction. Only trade with it.</span></div>
 <div class="kv"><b>2. Liquidity</b><span>Identify the pool price is drawn to (equal highs/lows, prior swing)</span></div>
 <div class="kv"><b>3. Sweep</b><span>Wait for the grab + rejection of that pool (the trigger)</span></div>
 <div class="kv"><b>4. Shift</b><span>CHoCH/MSS with displacement confirms the turn</span></div>
 <div class="kv"><b>5. Entry zone</b><span>OB or FVG left by the displacement, in premium (short) / discount (long)</span></div>
 <div class="kv"><b>6. Entry</b><span>Retest of the zone after inducement is swept; SL beyond the sweep; TP at next liquidity</span></div>
 <div class="note">Each layer is a FILTER that raises the probability — a single OB is 50/50, but an OB that (a) formed from displacement, (b) broke structure, (c) sits in discount, (d) after a HTF-aligned sweep is the 60–75% case. Your indicator's job is to COUNT these confluences and only flag when enough align. That's the difference between a noisy signal and a consistent one.</div>`},
];

/* Helpers for big annotated candles */
function bigCandle(x,yO,yC,yH,yL,w,bull){
  const col=bull?'#3ec77b':'#e0533b';const bt=Math.min(yO,yC),bb=Math.max(yO,yC);
  return `<line x1="${x}" y1="${yH}" x2="${x}" y2="${yL}" stroke="${col}" stroke-width="2"/><rect x="${x-w/2}" y="${bt}" width="${w}" height="${Math.max(bb-bt,2)}" fill="${col}"/>`;
}
function lbl(x,y,t,c){return `<text x="${x}" y="${y}" fill="${c||'#8a98a5'}" font-size="8" font-family="monospace">${t}</text>`}

 <div class="eg"><b>Worked example:</b> AUD/USD prints a big bullish 4H candle with a 15-pip lower wick. Drop to 15m: the first 4 candles sold off 15 pips into a prior demand zone (that's the wick), the 5th swept the low and closed back up (the turn), and the next 11 candles rallied 40 pips into the close (the body). At 4H you saw "a green candle." At 15m you saw a textbook sweep-and-deliver you could have traded.</div>

{n:'Anatomy of a Rejection Candle',badge:'Internal Structure',lead:'Long wick, small body (pin bar / hammer / shooting star). The footprint of price reaching a level and being violently refused.',
 body:`<p>A long wick means price <i>traveled there and could not stay</i>. Internally on the LTF, a long lower wick on a 4H candle is a complete round-trip:</p>

{n:'Power of 3 Inside One Candle',badge:'Internal Structure',lead:'Every HTF candle delivers in three internal acts: Accumulation → Manipulation → Distribution. The open and close positions reveal which.',
 body:`<p>A single HTF candle is a complete AMD cycle on the LTF. Reading where the open and close sit tells you the manipulation direction:</p>

{n:'Reversal vs Continuation — Reading Which',badge:'Application',lead:'The same long-wick candle means opposite things depending on location and what the internal structure did. Context decides.',
 body:`<p>A hammer at the bottom of a downtrend at support = powerful reversal. The identical hammer mid-range = meaningless noise. The candle's <i>location</i> changes its meaning entirely.</p>
 <div class="kv"><b>Reversal signal</b><span>Rejection candle AT a key level (S/R, OB, liquidity pool) + internal CHoCH against the prior trend</span></div>
 <div class="kv"><b>Continuation signal</b><span>Pause/pullback candle in the trend, at an FVG/OB, internal structure stays intact (no CHoCH)</span></div>
 <div class="kv"><b>The filter</b><span>Did the internal LTF action break structure? CHoCH = reversal bias. No CHoCH = continuation bias.</span></div>
 <div class="kv"><b>Confirmation</b><span>Wait for the NEXT candle. Rejection + follow-through close = real. No follow-through = likely false.</span></div>
 <div class="note">Most dangerous mistake: treating a single large candle spiking through a level as a genuine break. These often reverse within 1–2 candles because they lack sustained order flow. Demand a body close beyond the level, not a wick — a wick through structure is a stop hunt, not a break.</div>`,
 svg:svgWrap('',`
  ${lvl(40,20,150,'#e0533b',1,'resistance')}
  ${cstick(60,70,30,78,75,13)}${lbl(45,20,'reject @ level','#e0533b')}
  ${lbl(40,100,'= reversal','#e0533b')}
  ${lvl(70,180,300,'#5a6772',1,'mid-range')}
  ${cstick(230,90,55,98,94,13)}${lbl(200,115,'same candle, no level','#5a6772')}
  ${lbl(205,135,'= noise','#5a6772')}
 `,150)},
{n:'Candlestick Bible — Core Patterns',badge:'Homma / Reference',lead:'The classic Japanese patterns (Munehisa Homma, 17th c.) codified into the modern "Candlestick Trading Bible." Patterns are just named combinations of the anatomy you now understand.',
 body:`<p>Homma — the 17th-century rice trader called the "god of markets" — pioneered reading market psychology through candle shapes. The modern compilation organizes the highest-value patterns. They all reduce to body/wick anatomy + location:</p>
 <div class="kv"><b>Engulfing</b><span>Candle 2's body fully swallows candle 1's. Reversal — strongest at S/R after a trend.</span></div>
 <div class="kv"><b>Doji</b><span>Open ≈ close. Indecision. Dragonfly (long lower wick) = bullish; Gravestone (long upper) = bearish.</span></div>
 <div class="kv"><b>Hammer / Shooting Star</b><span>Small body, one long wick. Hammer = bottom reversal; shooting star = top reversal.</span></div>
 <div class="kv"><b>Morning / Evening Star</b><span>3-candle reversals: big candle → small indecision → big opposite candle.</span></div>
 <div class="kv"><b>Harami</b><span>Small candle inside the prior large body. Momentum stalling — potential reversal.</span></div>
 <div class="kv"><b>Tweezers</b><span>Two candles with matching highs (top) or lows (bottom). Rejection of the same level twice.</span></div>
 <div class="note">The bible's real lesson isn't memorizing shapes — it's that each pattern encodes a shift in the battle between buyers and sellers. Pin bars and engulfing bars at confluence (S/R + trend + a second signal) are the highest-probability plays it teaches. Pattern + location + confirmation, never the pattern alone.</div>`,
 svg:svgWrap('',`
  ${cstick(35,70,60,85,80,12)}${cstick(58,82,35,90,40,15)}${lbl(30,108,'engulf','#8a98a5')}
  ${cstick(105,60,40,95,62,12)}${lbl(92,108,'doji','#8a98a5')}
  ${cstick(150,55,48,100,62,12)}${lbl(135,108,'hammer','#8a98a5')}
  ${cstick(195,70,28,78,66,12)}${lbl(178,108,'star','#8a98a5')}
  ${cstick(245,50,42,95,60,12)}${cstick(262,58,40,64,52,8)}${lbl(232,108,'harami','#8a98a5')}
 `,125)},
{n:'How to Actually Use This',badge:'Synthesis',lead:'Reading internal candle structure is a confluence tool, not a standalone system. Here is the disciplined workflow.',
 body:`<p>Internal candle reading makes you better at <i>timing and conviction</i> within the SMC framework you already have:</p>
 <div class="kv"><b>1. HTF context first</b><span>Mark the key levels and bias on 4H/Daily before zooming in</span></div>
 <div class="kv"><b>2. Watch the HTF candle form</b><span>As a 4H candle builds at a key level, "open it" on the 15m to see the internal story</span></div>
 <div class="kv"><b>3. Read the internal structure</b><span>Is the LTF sweeping + reversing (CHoCH = reversal) or pulling back + continuing (no CHoCH)?</span></div>
 <div class="kv"><b>4. Demand confirmation</b><span>Body close beyond the level (not a wick). Follow-through on the next candle.</span></div>
 <div class="kv"><b>5. Locate the entry</b><span>The OB/FVG left by the internal displacement is your refined entry zone</span></div>
 <div class="note">Probabilistic, not certain. Wicks and patterns are reads on order flow, not guarantees — a meaningful share fail even in clean conditions. The edge comes from stacking: right pattern + right location + right internal structure + confirmation. That's the same confluence-counting principle behind a consistent indicator.</div>`,
 svg:svgWrap('',`
  ${lvl(40,20,290,'#e8aa42',1,'HTF level')}
  ${candle(60,80,72,88,84)}${candle(80,84,76,92,86)}
  ${candle(100,86,44,90,50)}<circle cx="100" cy="44" r="4" fill="none" stroke="#9a7bd0"/>${lbl(86,36,'sweep','#9a7bd0')}
  ${candle(120,50,56,60,58)}${lbl(108,75,'CHoCH','#e8aa42')}
  ${candle(140,58,64,68,62)}${candle(160,62,90,66,86)}
  ${candle(180,86,94,110,108)}${candle(200,108,112,128,124)}
  ${lbl(130,145,'level → sweep → CHoCH → deliver','#8a98a5')}
 `,160)},

{n:'Internal vs External Liquidity',badge:'Liquidity',tier:'int',lead:'Price cycles between two liquidity types: internal (pools inside the range) and external (the range extremes). Knowing which is being targeted tells you where price goes next.',
 body:`<p>External liquidity sits at the major swing high/low that defines the range. Internal liquidity sits <i>inside</i> that range — minor equal highs/lows, small swing points. Price oscillates: it grabs internal liquidity, then runs to external, then reverses.</p>
 <div class="kv"><b>External (EXT)</b><span>The big swing high/low — the range boundary, the ultimate draw</span></div>
 <div class="kv"><b>Internal (INT)</b><span>Minor pools within the range — fuel for the move toward external</span></div>
 <div class="kv"><b>The cycle</b><span>Sweep INT → deliver toward EXT → sweep EXT → reverse to the other side</span></div>
 <div class="why"><b>Why it works:</b> the algorithm needs liquidity to fill orders at every leg. Internal pools fund the trip to the external target; the external sweep funds the reversal. Mapping both tells you whether the current move is "going somewhere" (toward external) or just collecting internal stops before the real move.</div>
 <div class="eg"><b>Worked example:</b> AUD/USD ranges between 0.6550 (external low) and 0.6620 (external high). Price wicks an internal equal-low at 0.6575 (INT sweep), rallies to tag 0.6620 (EXT high), sweeps it by 3 pips, then reverses hard. The internal sweep was the tell that price wanted the external high next — and the external sweep was the reversal signal.</div>
 <div class="note">For your indicator: classify every pool as INT or EXT. A sweep of EXT is a far stronger reversal signal than a sweep of INT — INT sweeps are often just continuation fuel.</div>`,
 svg:svgWrap('',`
  ${lvl(28,20,300,'#4a90d9',1,'EXT high')}
  ${lvl(135,20,300,'#4a90d9',1,'EXT low')}
  ${lvl(70,20,200,'#e0533b',0,'INT')}
  ${lvl(100,20,200,'#e0533b',0,'INT')}
  ${candle(50,120,110,128,100)}${candle(68,100,85,105,75)}${candle(86,75,95,100,98)}
  ${candle(104,98,68,102,72)}${candle(122,72,55,76,48)}${candle(140,48,40,70,66)}
  ${candle(160,66,50,72,40)}${candle(180,40,30,46,34)}
  ${candle(200,34,40,50,32)}${candle(220,32,24,60,55)}
  <text x="120" y="155" fill="#8a98a5" font-size="8" font-family="monospace">sweep INT → run to EXT → reverse</text>
 `,165)},
{n:'Mitigation Block',badge:'Block',tier:'adv',lead:'A broken order block that forms WITHOUT a new high/low first. Price returns to the last down/up candle to let trapped traders "mitigate" (exit) — then continues.',
 body:`<p>After a market structure break (MSB), focus on the last candle before the break. Traders who entered on the losing side (the 1→2 swing) are now offside. When price returns to that level (point 1), they exit at reduced loss — that exit flow fuels continuation toward the next leg (point 3 and beyond).</p>
 <div class="kv"><b>Formation</b><span>MSB shifts structure; the last opposing candle becomes the mitigation block</span></div>
 <div class="kv"><b>vs Order Block</b><span>An OB forms from fresh institutional orders; a mitigation block is about <i>trapped</i> traders exiting</span></div>
 <div class="kv"><b>Bearish MB</b><span>Price breaks down, returns to point 1 (the rally origin), sells off again</span></div>
 <div class="kv"><b>Bullish MB</b><span>Mirror — price breaks up, returns to the drop origin, rallies again</span></div>
 <div class="why"><b>Why it works:</b> the move from 1→2 trapped longs (in a bearish case). When price falls 2→3 then rallies back to 1, those trapped traders finally get a chance to exit near breakeven. Their selling to exit adds supply exactly where smart money wants to re-enter short — so price reacts and continues lower.</div>
 <div class="eg"><b>Worked example:</b> AUD/USD rallies from 0.6580 (point 1) to 0.6610 (point 2), then breaks structure down through 0.6580 to 0.6560 (point 3). Price then rallies back to 0.6580 — the trapped longs from the first rally exit here, and price rejects, continuing toward the HTF support below.</div>
 <div class="note">Key tell: the failure swing — no new low (bullish MB) or no new high (bearish MB) before the structural break. That's what distinguishes it from a standard order block.</div>`,
 svg:svgWrap('',`
  ${lvl(60,20,300,'#e0533b',1,'pt 1 / MB')}
  ${candle(45,95,85,100,80)}
  ${candle(63,80,60,84,58)}<circle cx="63" cy="60" r="5" fill="none" stroke="#e8aa42"/><text x="48" y="52" fill="#e8aa42" font-size="7" font-family="monospace">1</text>
  ${candle(81,58,40,62,42)}<text x="78" y="34" fill="#8a98a5" font-size="7" font-family="monospace">2</text>
  ${candle(99,42,55,62,58)}${candle(117,58,70,90,86)}
  ${candle(135,86,75,95,78)}<circle cx="135" cy="62" r="5" fill="none" stroke="#e8aa42"/><text x="138" y="58" fill="#8a98a5" font-size="7" font-family="monospace">3 (return to 1)</text>
  ${candle(153,78,95,100,92)}${candle(171,92,100,128,124)}
  <text x="60" y="150" fill="#8a98a5" font-size="8" font-family="monospace">trapped longs exit at 1 → continuation down</text>
 `,165)},
{n:'Vacuum Block',badge:'Block',tier:'adv',lead:'A gap created by a volatility event (NFP, session open) where liquidity vanished. Treat the gap as a single candle/range — price often returns to fill it.',
 body:`<p>When a high-impact event hits, price can leap with almost no trades in between — a "vacuum" of liquidity. That empty range behaves like one big candle: define its high and low and treat it as a zone.</p>
 <div class="kv"><b>Cause</b><span>NFP, FOMC, or a futures session open — a volatility shock</span></div>
 <div class="kv"><b>Treat as</b><span>A single candle/range: the gap's high and low are your levels</span></div>
 <div class="kv"><b>Stops the fill</b><span>A bearish order block / up-candle inside the gap can halt the fill — a selling opportunity</span></div>
 <div class="kv"><b>Full fill</b><span>If 100% filled (full return), price is rebalanced — then if it declines, you don't want it back inside the filled vacuum</span></div>
 <div class="why"><b>Why it works:</b> the gap is pure inefficiency — price moved without two-sided trade. Markets dislike inefficiency and often return to "fill" it, the same logic as an FVG but caused by an event rather than displacement. The fill gives institutions the two-sided liquidity the spike denied them.</div>
 <div class="eg"><b>Worked example:</b> NFP drops and AUD/USD gaps from 0.6600 to 0.6635 in seconds with no trades between. That 35-pip vacuum is your zone. Price later drifts back to 0.6635, stalls at a bearish order block inside the gap at 0.6620, and that becomes the short entry as the gap partially fills.</div>
 <div class="note">Corrective fill in the trend direction = more probable. A full fill that becomes an exhaustion gap = less probable, higher risk. Pair vacuum blocks with the News tab — they form on exactly the events listed there.</div>`,
 svg:svgWrap('',`
  ${candle(50,100,92,106,96)}${candle(66,96,90,102,94)}
  <rect x="80" y="60" width="30" height="34" fill="#e8aa4218" stroke="#e8aa42" stroke-dasharray="3 2"/><text x="95" y="55" fill="#e8aa42" font-size="7" font-family="monospace" text-anchor="middle">vacuum</text>
  <text x="113" y="70" fill="#8a98a5" font-size="7" font-family="monospace">high</text><text x="113" y="92" fill="#8a98a5" font-size="7" font-family="monospace">low</text>
  ${candle(130,58,48,62,52)}${candle(146,52,44,56,40)}
  ${candle(170,40,55,60,58)}<text x="158" y="48" fill="#e0533b" font-size="7" font-family="monospace">OB stops fill</text>
  ${candle(188,58,44,62,40)}${candle(206,40,30,46,34)}
  <text x="60" y="150" fill="#8a98a5" font-size="8" font-family="monospace">event gap → partial fill → continuation</text>
 `,165)},
{n:'Rejection Block (RJB)',badge:'Block',tier:'adv',lead:'A refinement of the order block that focuses purely on the WICK of the stop-run candle — when the wick is ~40%+ of the candle, that wick zone holds the aggressive orders.',
 body:`<p>Where an order block uses the candle body, a rejection block uses the <i>wick</i>. When price spikes to grab liquidity and rejects hard, the long wick marks where the most aggressive orders transacted — and price often respects that wick zone on return.</p>
 <div class="kv"><b>Trigger</b><span>A stop-run candle with a wick ~40% or more of total candle size</span></div>
 <div class="kv"><b>The zone</b><span>The wick itself (not the body) — open/close of the wick range</span></div>
 <div class="kv"><b>Why the wick</b><span>The long wick = aggressive rejection; imbalances were left inside that narrow, fast-moving zone</span></div>
 <div class="why"><b>Why it works:</b> a long wick means price went somewhere and was violently refused — the speed of that move leaves inefficiency inside the wick. Aggressive market orders that caused the rejection sit in that band. On return, that residual interest defends the level, often more precisely than the candle body would.</div>
 <div class="eg"><b>Worked example:</b> AUD/USD prints a candle that wicks down to 0.6555 but closes at 0.6575 — a 20-pip lower wick on a 5-pip body. That lower wick (0.6555–0.6560) is the rejection block. Price returns days later, taps 0.6558, and rallies — the wick zone held.</div>
 <div class="note">RJB is one of the family of CRT key levels (with FVG, IFVG, OB, Breaker). Use it when a clean OB isn't obvious but a dramatic rejection wick is.</div>`,
 svg:svgWrap('',`
  ${candle(60,80,74,86,78)}
  ${bigCandle(110,70,64,118,72,26,true)}
  <rect x="92" y="90" width="36" height="28" fill="#9a7bd033" stroke="#9a7bd0" stroke-dasharray="2 2"/><text x="135" y="106" fill="#9a7bd0" font-size="7" font-family="monospace">RJB (wick)</text>
  ${candle(150,72,66,80,76)}${candle(168,76,70,84,72)}
  ${candle(190,72,96,100,104)}${candle(208,104,90,114,96)}
  <text x="60" y="150" fill="#8a98a5" font-size="8" font-family="monospace">long wick = rejection zone, holds on return</text>
 `,165)},
{n:'Weekly AMD Profile',badge:'Time / Cycle',tier:'adv',lead:'The week unfolds in a cycle: Monday accumulates, Tuesday manipulates, Wed–Thu expand, Friday returns to range. Knowing the day tells you what behavior to expect.',
 body:`<p>The weekly candle is itself a Power-of-3 (Accumulation → Manipulation → Distribution) spread across the days. Each day has a character:</p>
 <div class="kv"><b>Monday</b><span>Accumulation. Small range, weekly open, often a Judas swing. Not ideal to trade.</span></div>
 <div class="kv"><b>Tuesday</b><span>Manipulation. Typically sets the week's high or low. Judas swing / raid of Monday's H-L. Good to trade.</span></div>
 <div class="kv"><b>Wed–Thu</b><span>Expansion / distribution. The real directional move toward the weekly draw on liquidity. Best days.</span></div>
 <div class="kv"><b>Friday</b><span>Return into the range (~20–30% retrace), profit-taking, weekly close. Not ideal to trade.</span></div>
 <div class="why"><b>Why it works:</b> institutional positioning follows a weekly rhythm — early week builds positions and traps breakout traders, midweek delivers the move, end of week takes profit. Aligning with this cycle means you trade when expansion is likely (mid-week) and stand aside when chop is likely (Mon/Fri).</div>
 <div class="eg"><b>Worked example:</b> Monday AUD/USD ranges quietly around the weekly open. Tuesday spikes up to raid Monday's high (manipulation), then reverses — that's the week's high. Wed–Thu it trends down toward the weekly sell-side draw on liquidity. Friday it retraces 25% into the range and closes. A short taken Tuesday at the manipulation high, targeting the weekly DOL, rode the expansion.</div>
 <div class="note">Pair with the News tab: high-impact news Mon–Wed is the catalyst for the manipulation + expansion. If Mon–Wed news fails to manipulate the external range, anticipate a consolidation/reversal week instead.</div>`,
 svg:svgWrap('',`
  ${['Mon','Tue','Wed','Thu','Fri'].map((d,i)=>`<line x1="${40+i*55}" y1="20" x2="${40+i*55}" y2="140" stroke="#1e262e"/><text x="${44+i*55}" y="15" fill="#5a6772" font-size="8" font-family="monospace">${d}</text>`).join('')}
  <polyline points="50,90 70,80 95,95 110,55 130,70 150,40 175,60 190,85 215,105 240,120 255,100" fill="none" stroke="#3ec77b" stroke-width="1.5"/>
  <text x="55" y="115" fill="#4a90d9" font-size="7" font-family="monospace">accum</text>
  <text x="105" y="40" fill="#e0533b" font-size="7" font-family="monospace">manip↑</text>
  <text x="180" y="135" fill="#e8aa42" font-size="7" font-family="monospace">expansion↓</text>
 `,160)},
{n:'Order Block Curve Selection',badge:'Block (Pro)',tier:'adv',lead:'When multiple order blocks stack, which do you trade? The "curve" method ranks them by freshness and position (premium/discount) to pick the highest-probability zone.',
 body:`<p>Advanced OB work: in a leg, several supply/demand zones may exist. You choose based on whether zones are <i>fresh</i> (untested) and where they sit on the curve (premium vs discount of the move).</p>
 <div class="kv"><b>All fresh zones</b><span>Simple — take the zone at ~50% (mid-range), the cleanest single choice</span></div>
 <div class="kv"><b>Mix of fresh/non-fresh</b><span>Favor the fresh zone in control; may need to look "left and above" for an untested one</span></div>
 <div class="kv"><b>Stacked options</b><span>Fresh counter-trend zone + fresh opposite zone → deeper entries (~25% / discount) for better R</span></div>
 <div class="kv"><b>Principle</b><span>Fresh + extreme position (deep discount for longs) = best reaction + best reward-to-risk</span></div>
 <div class="why"><b>Why it works:</b> a fresh (unmitigated) zone still holds its full institutional interest — each prior tap drains it. And a zone deeper in discount gives a tighter stop and larger target, improving R even if the hit rate is similar. You're optimizing two things at once: probability (freshness) and payoff (position on the curve).</div>
 <div class="eg"><b>Worked example:</b> price drops leaving three demand zones — one at 0.6600 (tested twice), one at 0.6580 (fresh), one at 0.6560 (fresh, deep discount). Skip 0.6600 (drained). The 0.6560 fresh discount zone offers the best R: tighter stop below it, bigger run to the external high. You set a limit there rather than chasing the shallower zone.</div>
 <div class="note">This is niche/pro-level. For most setups, the single fresh zone nearest your bias is enough — curve selection matters when zones stack and you must rank them.</div>`,
 svg:svgWrap('',`
  ${candle(50,40,32,46,36)}${candle(66,36,30,44,40)}
  <rect x="40" y="50" width="200" height="14" fill="#e0533b18" stroke="#e0533b" stroke-dasharray="2 2"/><text x="245" y="60" fill="#e0533b" font-size="7" font-family="monospace">tested ✕</text>
  <rect x="40" y="80" width="200" height="14" fill="#3ec77b22" stroke="#3ec77b"/><text x="245" y="90" fill="#3ec77b" font-size="7" font-family="monospace">fresh ~50%</text>
  <rect x="40" y="110" width="200" height="14" fill="#3ec77b33" stroke="#3ec77b"/><text x="245" y="120" fill="#3ec77b" font-size="7" font-family="monospace">fresh deep ✓</text>
  ${candle(90,64,58,86,82)}${candle(110,82,76,100,96)}${candle(130,96,90,118,114)}
  <text x="60" y="150" fill="#8a98a5" font-size="8" font-family="monospace">rank zones: freshness + curve position</text>
 `,165)},
{n:'Classic Chart Patterns',badge:'Pattern',tier:'beg',lead:'The traditional continuation and reversal patterns every trader should recognize: flags, pennants, triangles, cup & handle, double bottoms. Pure price geometry.',
 body:`<p>Before smart-money concepts, these classic patterns formed the foundation of technical analysis. Each implies a measured move and a logical stop. They still work as structure-reading tools and pair well with SMC (a bull flag often hides an order block at its base).</p>
 <div class="kv"><b>Bull Flag</b><span>Sharp rally (pole) → small downward channel (flag) → break up. Buy the breakout, stop below flag.</span></div>
 <div class="kv"><b>Pennant</b><span>Like a flag but the consolidation is a small symmetrical triangle. Same logic.</span></div>
 <div class="kv"><b>Cup & Handle</b><span>Rounded bottom (cup) + small pullback (handle) → breakout. Continuation.</span></div>
 <div class="kv"><b>Ascending Scallop</b><span>Rounded base curving up → breakout from the rim.</span></div>
 <div class="kv"><b>Triangles</b><span>Symmetrical (compression), Ascending (flat top, rising lows = bullish). Break in trend direction.</span></div>
 <div class="kv"><b>Double Bottom</b><span>Two lows at the same level (a "W") → break the middle peak = reversal up.</span></div>
 <div class="kv"><b>3 Rising Valleys</b><span>Three higher lows stair-stepping up → continuation.</span></div>
 <div class="why"><b>Why they work:</b> each encodes the same thing in different shapes — a pause that resolves in the dominant direction. The flag/pennant is profit-taking inside a trend; the triangle is compressing volatility before expansion; the double bottom is a failed second attempt to push lower. SMC explains the <i>why</i> (liquidity, absorption); these patterns are the visible <i>shape</i> of it.</div>
 <div class="eg"><b>Worked example:</b> AUD/USD rallies 40 pips (pole), then drifts down in a tight channel for six candles (flag) on declining momentum. Price breaks the upper flag line — entry on the break, stop below the flag low, target = pole height projected from the breakout (~40 pips).</div>
 <div class="note">Buy the breakout/retest, stop beyond the pattern, target the measured move. Treat them as confluence with your SMC read, not standalone signals — a pattern at a key level beats a pattern in no-man's-land.</div>`,
 svg:svgWrap('',`
  <text x="30" y="20" fill="#8a98a5" font-size="8" font-family="monospace">bull flag</text>
  <polyline points="25,120 35,70 45,75 55,85 50,90 60,95 70,100 80,55" fill="none" stroke="#3ec77b" stroke-width="1.5"/>
  <line x1="42" y1="70" x2="72" y2="92" stroke="#5a6772" stroke-dasharray="2 2"/><line x1="48" y1="88" x2="78" y2="108" stroke="#5a6772" stroke-dasharray="2 2"/>
  <text x="120" y="20" fill="#8a98a5" font-size="8" font-family="monospace">double bottom</text>
  <polyline points="110,50 125,95 140,75 155,95 175,45" fill="none" stroke="#3ec77b" stroke-width="1.5"/>
  ${lvl(95,108,180,'#e0533b',1,'')}
  <text x="210" y="20" fill="#8a98a5" font-size="8" font-family="monospace">asc. triangle</text>
  ${lvl(50,205,290,'#3ec77b',0,'')}
  <polyline points="205,110 220,60 235,95 250,60 265,80 280,55" fill="none" stroke="#3ec77b" stroke-width="1.5"/>
 `,150)},,
{n:'Order Flow — Who Is in Control',badge:'Order Flow',tier:'adv',lead:'The real-time battle between buyers and sellers, read through candle bodies, wick length, and close location — no indicator required.',
 body:`<p>Order flow is reading <i>who is winning right now</i> from the candles themselves. Big green bodies = buyers in control. Big red bodies = sellers in control. Small mixed candles = nobody in control, wait.</p>
 <div class="kv"><b>Bullish order flow</b><span>Large green bodies, small upper wicks, each candle closing near its high</span></div>
 <div class="kv"><b>Bearish order flow</b><span>Large red bodies, small lower wicks, each candle closing near its low</span></div>
 <div class="kv"><b>Neutral</b><span>Small mixed bodies, wicks both sides — the battle is undecided, stand aside</span></div>
 <div class="why"><b>Why it works:</b> price is the footprint of executed orders. A large body means one side overwhelmed the other and kept control from open to close. Wick length shows where a side <i>tried</i> and got rejected. You're reading the actual transactions, not a lagging average of them — which is why it confirms a setup faster than any indicator.</div>
 <div class="eg"><b>Worked example:</b> AUD/USD taps your demand zone at 0.6580. The next three 5m candles print large green bodies closing near their highs with tiny wicks — order flow just confirmed buyers stepped in. That's your entry trigger. If instead they were small dojis, the zone is being tested weakly — you wait.</div>
 <div class="note">Order flow does not replace your SMC setup — it validates it. The setup tells you WHERE; order flow tells you WHEN the zone is actually holding.</div>`,
 svg:svgWrap('',`
  <text x="20" y="15" fill="#3ec77b" font-size="8" font-family="monospace">bullish control</text>
  ${candle(30,95,75,98,88)}${candle(46,88,64,90,70)}${candle(62,70,48,74,54)}${candle(78,54,34,58,40)}
  <text x="120" y="15" fill="#8a98a5" font-size="8" font-family="monospace">neutral</text>
  ${candle(130,60,56,68,52)}${candle(146,56,60,66,50)}${candle(162,60,54,64,50)}
  <text x="210" y="15" fill="#e0533b" font-size="8" font-family="monospace">bearish control</text>
  ${candle(225,40,60,42,68)}${candle(241,60,80,62,86)}${candle(257,80,100,82,106)}${candle(273,100,118,102,124)}
  <text x="20" y="150" fill="#8a98a5" font-size="8" font-family="monospace">body size + close location = who won the candle</text>
 `,160)},
{n:'Order Flow Shift',badge:'Order Flow',tier:'adv',lead:'The moment control changes hands. Candle bodies start shrinking in the current direction, then an opposite candle engulfs — control has flipped.',
 body:`<p>An order flow shift is the earliest read that a move is exhausting. You see it before structure officially breaks, in the size and character of the candles.</p>
 <div class="kv"><b>Sign 1</b><span>Bodies shrinking in the current direction (momentum fading)</span></div>
 <div class="kv"><b>Sign 2</b><span>Wicks growing in the trend direction (rejection appearing)</span></div>
 <div class="kv"><b>Sign 3</b><span>A single large opposite candle appears, bigger than recent candles</span></div>
 <div class="kv"><b>Sign 4</b><span>That opposite candle engulfs or covers multiple previous candles</span></div>
 <div class="why"><b>Why it works:</b> control doesn't vanish instantly — it fades. Shrinking bodies mean the dominant side is running out of orders; growing counter-wicks mean the other side is testing. The engulfing candle is the confirmation that order flow has actually changed hands. This is the candle-level version of a CHoCH.</div>
 <div class="eg"><b>Worked example:</b> price is dropping into your demand zone — but the red bodies get smaller each candle (8, 5, 3 pips) while lower wicks grow. Then one large green candle engulfs the last three reds. Order flow shifted from sellers to buyers <i>at your zone</i> — that's the confirmation to enter long.</div>
 <div class="note">An order flow shift at a key level (OB/FVG/OTE) is high-probability. The same shift at a random mid-range price is far less reliable — location still matters.</div>`,
 svg:svgWrap('',`
  ${candle(40,40,55,44,58)}${candle(56,58,68,60,72)}${candle(72,72,80,74,84)}${candle(88,84,90,86,94)}
  <text x="36" y="108" fill="#e0533b" font-size="7" font-family="monospace">bodies shrinking ↓</text>
  ${candle(110,94,90,98,86)}
  ${bigCandle(150,92,40,96,36,16,true)}
  <text x="128" y="30" fill="#3ec77b" font-size="8" font-family="monospace">engulfing — flow flips</text>
  ${candle(180,40,30,44,26)}${candle(196,26,16,30,12)}
  <text x="40" y="150" fill="#8a98a5" font-size="8" font-family="monospace">fade → engulf → new control</text>
 `,160)},
{n:'Reading Wicks for Trapped Traders',badge:'Order Flow',tier:'adv',lead:'A wick at a key level shows who got trapped. Long lower wick = shorts trapped (buy signal). Long upper wick = longs trapped (sell signal). At a random level it means nothing.',
 body:`<p>Wicks are where price went and got rejected — which means a group of traders is now offside. Reading which group got trapped tells you the likely next move.</p>
 <div class="kv"><b>Long lower wick at demand/OTE</b><span>Shorts got trapped below — they must buy to cover = fuel up. BUY signal.</span></div>
 <div class="kv"><b>Long upper wick at supply/premium</b><span>Longs got trapped above — they must sell to exit = fuel down. SELL signal.</span></div>
 <div class="kv"><b>Long wick at a random level</b><span>Just a wick. No trapped cluster. Means nothing — ignore.</span></div>
 <div class="kv"><b>Equal wicks / no wicks</b><span>Indecision or pure control respectively — read with the bodies.</span></div>
 <div class="why"><b>Why it works:</b> a long wick into a liquidity level means stops were triggered and breakout traders entered — right before price reversed. Those traders are now trapped on the wrong side. Their forced exit (covering) becomes the fuel for the move in your direction. The level is what makes the wick meaningful; without trapped orders, a wick is just noise.</div>
 <div class="eg"><b>Worked example:</b> price spikes below the previous day low (where sell-stops and breakout shorts cluster), prints a long lower wick, and closes back above. Those shorts are trapped. As they cover, price rallies — you enter long on the close back inside, stop below the wick.</div>
 <div class="note">Wick reading only works AT key levels — demand/supply, OTE, PDH/PDL, liquidity pools. At a random mid-range price, a wick tells you nothing.</div>`,
 svg:svgWrap('',`
  ${lvl(95,30,300,'#3ec77b',1,'demand')}
  ${candle(50,80,72,86,76)}${candle(66,76,84,80,70)}
  ${bigCandle(86,70,55,118,58,14,true)}
  <circle cx="86" cy="112" r="5" fill="none" stroke="#9a7bd0"/><text x="60" y="130" fill="#9a7bd0" font-size="7" font-family="monospace">shorts trapped</text>
  ${candle(110,55,44,60,40)}${candle(126,40,30,44,26)}${candle(142,26,16,30,12)}
  <text x="170" y="60" fill="#3ec77b" font-size="8" font-family="monospace">long lower wick</text>
  <text x="170" y="74" fill="#8a98a5" font-size="8" font-family="monospace">at level = BUY</text>
 `,150)},
{n:'Supply & Demand Zones',badge:'Order Flow',tier:'int',lead:'The broad areas where price exploded from — supply (sellers overwhelmed buyers) pushes price down, demand (buyers overwhelmed sellers) pushes price up. The base of an order block.',
 body:`<p>A supply or demand zone is drawn from the last consolidation candle before a strong displacement move. It's the broader cousin of the order block — same idea, wider zone.</p>
 <div class="kv"><b>Supply zone</b><span>The last green candle(s) before a strong red drop. Price returns → sellers step in. Acts as resistance.</span></div>
 <div class="kv"><b>Demand zone</b><span>The last red candle(s) before a strong green rally. Price returns → buyers step in. Acts as support.</span></div>
 <div class="kv"><b>Strong zone</b><span>Displacement away was fast with big candles, left an FVG, price never retested. 5/5 = full position.</span></div>
 <div class="kv"><b>Weak zone</b><span>Slow departure, no FVG, already tested twice. Reduce size or skip.</span></div>
 <div class="why"><b>Why it works:</b> a strong move from a zone means institutions left unfilled orders there — they couldn't fill their entire position before price ran. When price returns, those resting orders execute, defending the zone. The freshness matters because each retest consumes more of those orders.</div>
 <div class="eg"><b>Worked example:</b> AUD/USD consolidates at 0.6600 then explodes up 50 pips leaving an FVG. That consolidation is your demand zone. Hours later price drifts back to 0.6600, taps the zone (still fresh), prints bullish order flow, and rallies — entry long, stop below the zone.</div>
 <div class="note">Supply/Demand is the FOUNDATION; SMC order blocks are the REFINEMENT. The OB is the single precise candle inside the broader S/D zone. Use S/D to find the area, the OB to find the exact entry.</div>`,
 svg:svgWrap('',`
  <rect x="30" y="30" width="260" height="16" fill="#e0533b22" stroke="#e0533b" stroke-dasharray="2 2"/><text x="34" y="26" fill="#e0533b" font-size="7" font-family="monospace">supply</text>
  <rect x="30" y="104" width="260" height="16" fill="#3ec77b22" stroke="#3ec77b"/><text x="34" y="134" fill="#3ec77b" font-size="7" font-family="monospace">demand (fresh)</text>
  ${candle(60,112,108,116,104)}${candle(76,108,90,112,86)}${candle(92,86,64,90,60)}${candle(108,60,44,64,40)}${candle(124,40,38,46,34)}
  ${candle(150,38,42,50,46)}${candle(166,46,40,52,36)}
  ${candle(200,108,112,116,110)}<text x="180" y="128" fill="#3ec77b" font-size="7" font-family="monospace">retest → rally</text>
  ${candle(216,110,92,114,88)}${candle(232,88,66,92,62)}
 `,150)},
{n:'Volume Profile — HVN, LVN, POC',badge:'Order Flow',tier:'adv',lead:'Shows where orders are stacked by price, not by time. High-volume nodes act as magnets, low-volume nodes get crossed fast, and the Point of Control is the strongest magnet of all.',
 body:`<p>Volume Profile plots how much trading happened at each <i>price</i> level (not each time bar). It reveals where institutions filled the most orders.</p>
 <div class="kv"><b>HVN (High Volume Node)</b><span>Where the most trading happened. Price consolidates here and is drawn back to it — acts as a magnet and as support/resistance.</span></div>
 <div class="kv"><b>LVN (Low Volume Node)</b><span>Where very little traded. Price moves through it fast — thin air, no orders to slow it. Acts like a speed zone.</span></div>
 <div class="kv"><b>POC (Point of Control)</b><span>The single price with the highest volume. The strongest magnet on the chart — price gravitates toward it.</span></div>
 <div class="why"><b>Why it works:</b> price is auction-driven. Where lots of volume traded (HVN), both sides agreed value exists, so price returns there to do business. Where little traded (LVN), there's an imbalance — price slices through because there are no resting orders to absorb it. This is the volume-based explanation for why FVGs (which are LVNs) get filled and why HVNs act as support/resistance.</div>
 <div class="eg"><b>Worked example:</b> the POC on AUD/USD sits at 0.6595. Price spikes up to 0.6630 into a thin LVN, finds no buyers, and falls back toward the 0.6595 POC magnet — where your demand zone also sits. That HVN + demand confluence is a double-confirmation long.</div>
 <div class="note">Volume Profile does not replace SMC — it adds a layer. When your order block or demand zone sits at an HVN, or your FVG aligns with an LVN, the probability doubles. POC as a take-profit target is high-probability.</div>`,
 svg:svgWrap('',`
  <line x1="40" y1="20" x2="40" y2="140" stroke="#28323d"/>
  ${[[30,'',12],[45,'',20],[58,'',34],[70,'POC',60],[82,'',30],[95,'',16],[108,'',8],[120,'',40],[130,'',22]].map((b,i)=>{
    const y=28+i*13; const w=b[2]*2.4; const isP=b[1]==='POC'; const isL=b[2]<12;
    return `<rect x="40" y="${y}" width="${w}" height="9" fill="${isP?'#e8aa42':isL?'#e0533b88':'#4a90d9'}"/>${b[1]?`<text x="${44+w}" y="${y+8}" fill="#e8aa42" font-size="8" font-family="monospace">${b[1]}</text>`:''}${isL?`<text x="${44+w}" y="${y+8}" fill="#e0533b" font-size="7" font-family="monospace">LVN</text>`:''}`;
  }).join('')}
  <text x="210" y="95" fill="#4a90d9" font-size="8" font-family="monospace">HVN = magnet</text>
  <text x="210" y="110" fill="#8a98a5" font-size="7" font-family="monospace">volume by price</text>
 `,160)},
{n:'Wyckoff Basics',badge:'Order Flow',tier:'adv',lead:'The original smart-money framework (1930s). Accumulation → Markup → Distribution → Markdown. ICT is a modern evolution of exactly this.',
 body:`<p>Richard Wyckoff described how large operators accumulate positions quietly, mark price up, distribute to the public, then mark it down. The terminology changed; the behavior didn't.</p>
 <div class="kv"><b>Accumulation</b><span>Smart money quietly builds longs in a range. = ICT Asian range / demand zone building.</span></div>
 <div class="kv"><b>Spring</b><span>A fake breakdown below the range to grab liquidity before markup. = ICT liquidity sweep / SSL grab.</span></div>
 <div class="kv"><b>Markup</b><span>The real move up. = ICT bullish displacement / BOS.</span></div>
 <div class="kv"><b>Distribution</b><span>Smart money sells to the public at the top in a range. = ICT supply zone / BSL building.</span></div>
 <div class="kv"><b>Upthrust</b><span>A fake breakout above to grab buy-side liquidity before markdown. = ICT BSL sweep.</span></div>
 <div class="kv"><b>Markdown</b><span>The real move down. = ICT bearish displacement.</span></div>
 <div class="why"><b>Why it works:</b> Wyckoff reverse-engineered institutional behavior a century ago — the need to fill large orders without moving price against yourself forces a repeatable cycle. ICT's liquidity-sweep-then-displace model is the same mechanic with modern names. Understanding Wyckoff shows you the WHY behind the ICT patterns you trade.</div>
 <div class="eg"><b>Worked example:</b> AUD/USD ranges all Asian session (accumulation), spikes below the range low at London open and snaps back (spring / SSL sweep), then trends up all NY AM (markup). If you know Wyckoff, you recognized the spring as your long entry the moment it reclaimed the range.</div>
 <div class="note">Wyckoff described in the 1930s what ICT teaches today. The market hasn't changed — only the terminology has. The spring IS the sweep. Accumulation IS the Asian range.</div>`,
 svg:svgWrap('',`

 {id:'journal',n:'Journal',icon:'M5 3h11l3 3v15H5zM15 3v4h4M8 11h8M8 15h8'},
 {id:'stats',n:'Stats',icon:'M3 13h2v6H3zm4-5h2v11H7zm4-4h2v15h-2zm4 7h2v8h-2zm4-3h2v11h-2z'},

function nav(id){
  $$('.view').forEach(v=>v.classList.remove('on'));
  const v=$('#v-'+id); if(v)v.classList.add('on');
  $$('.tabbar button').forEach(b=>b.classList.toggle('on',b.dataset.t===id));
  window.scrollTo(0,0);

$('#tabbar').innerHTML=TABS.map(t=>`<button data-t="${t.id}" onclick="nav('${t.id}')">

/* ============ ANALYTICS ENGINE ============ */
function stats(trades){
  const closed=trades.filter(t=>t.outcome!=null);
  const n=closed.length;
  if(!n)return{n:0,wins:0,wr:0,avgR:0,totR:0,pf:0,exp:0,bySession:{},byModel:{},byDay:{},maxDD:0,curve:[0]};
  let wins=0,totR=0,gp=0,gl=0,curve=[0],peak=0,maxDD=0;
  const bySession={},byModel={},byDay={};
  closed.slice().reverse().forEach(t=>{
    const r=Number(t.r)||0; totR+=r; if(r>0){wins++;gp+=r}else{gl+=Math.abs(r)}
    curve.push(+(curve[curve.length-1]+r).toFixed(2));
    peak=Math.max(peak,curve[curve.length-1]); maxDD=Math.max(maxDD,peak-curve[curve.length-1]);
    const acc=(o,k)=>{o[k]=o[k]||{n:0,r:0,w:0};o[k].n++;o[k].r+=r;if(r>0)o[k].w++};
    acc(bySession,t.session||'—'); acc(byModel,t.model||'—');
    acc(byDay,new Date(t.date).toLocaleDateString('en',{weekday:'short'}));
  });
  return{n,wins,wr:wins/n*100,avgR:totR/n,totR,pf:gl?gp/gl:gp,exp:totR/n,bySession,byModel,byDay,maxDD,curve};
}

/* ============ RENDER DISPATCHER ============ */
function render(id){
  ({journal:renderJournal,stats:renderStats,plan:renderPlan,rules:renderRules,edu:renderEdu,ref:renderRef}[id])();
}

/* ---- DASHBOARD ---- */
function renderStats(){
  const s=stats(DB.trades);
  const wrCol=s.wr>=50?'pos':s.wr>0?'amber':'';
  const tags={};DB.trades.filter(t=>t.outcome!=null&&t.mistake&&t.mistake!=='None').forEach(t=>tags[t.mistake]=(tags[t.mistake]||0)+1);
  const topLeak=Object.keys(tags).sort((a,b)=>tags[b]-tags[a])[0];
  $('#v-stats').innerHTML=`
  <div class="card">
    <h3>Performance <span class="tag">${s.n} closed trades</span></h3>
    <div class="statgrid">
      <div class="stat"><div class="v ${wrCol}">${s.n?fmt(s.wr,0):'—'}${s.n?'%':''}</div><div class="l">Win Rate</div></div>
      <div class="stat"><div class="v ${s.totR>=0?'pos':'neg'}">${s.n?(s.totR>=0?'+':'')+fmt(s.totR,1):'—'}</div><div class="l">Total R</div></div>
      <div class="stat"><div class="v ${s.exp>=0?'pos':'neg'}">${s.n?(s.exp>=0?'+':'')+fmt(s.exp,2):'—'}</div><div class="l">Expectancy</div></div>
      <div class="stat"><div class="v">${s.n?fmt(s.pf,2):'—'}</div><div class="l">Profit Factor</div></div>
      <div class="stat"><div class="v">${s.n?fmt(s.avgR,2):'—'}</div><div class="l">Avg R / Trade</div></div>
      <div class="stat"><div class="v neg">${s.n?'-'+fmt(s.maxDD,1):'—'}</div><div class="l">Max Drawdown</div></div>
    </div>
    <div class="note" style="margin-top:12px">Profit factor above 1.5 is good, above 2.0 excellent. Expectancy is your average R per trade — if it's positive over 100+ trades, you have a confirmed edge. ${topLeak?`<b style="color:var(--amber)">Biggest leak: ${esc(topLeak)} (${tags[topLeak]}×).</b>`:''}</div>
  </div>
  <div class="card">
    <h3>Equity Curve <span class="tag">cumulative R</span></h3>
    ${s.n>1?`<canvas id="curve" height="150"></canvas>`:`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3v18h18M7 14l3-4 3 3 4-6"/></svg>Log trades to see your equity curve build.</div>`}
  </div>
  ${s.n?`<div class="card"><h3>Edge by Model</h3>${breakdown(s.byModel)}</div>
  <div class="card"><h3>Edge by Session</h3>${breakdown(s.bySession)}</div>
  <div class="card"><h3>Edge by Day of Week</h3>${breakdown(s.byDay)}</div>`:''}
  <button class="btn" onclick="openTrade()">+ Log a Trade</button>
  <div style="height:10px"></div>
  <button class="btn ghost" onclick="exportData()">Export / Backup Data</button>`;
  if(s.n>1)drawCurve(s.curve);
}
function breakdown(o){
  const ks=Object.keys(o).sort((a,b)=>o[b].r-o[a].r);
  if(!ks.length)return'<div class="faint">No data yet.</div>';
  return ks.map(k=>{const d=o[k],wr=d.w/d.n*100;
   return `<div style="margin-bottom:10px"><div style="display:flex;font-size:13px;margin-bottom:4px"><span>${esc(k)}</span><span class="mono" style="margin-left:auto;color:${d.r>=0?'var(--green)':'var(--red)'}">${d.r>=0?'+':''}${fmt(d.r,1)}R</span></div>
   <div class="bar"><div style="width:${wr}%;background:var(--green)"></div><div style="width:${100-wr}%;background:var(--red-d)"></div></div>
   <div class="faint mono" style="font-size:10px;margin-top:3px">${d.n} trades · ${fmt(wr,0)}% win</div></div>`;
  }).join('');
}
function drawCurve(c){
  const cv=$('#curve');if(!cv)return; const ctx=cv.getContext('2d');
  const W=cv.width=cv.offsetWidth*2,H=cv.height=300; cv.style.height='150px';
  const mn=Math.min(0,...c),mx=Math.max(0,...c),rng=mx-mn||1,pad=20;
  const x=i=>pad+i/(c.length-1)*(W-pad*2), y=v=>H-pad-(v-mn)/rng*(H-pad*2);
  // zero line
  ctx.strokeStyle='#262f38';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad,y(0));ctx.lineTo(W-pad,y(0));ctx.stroke();
  // fill
  ctx.beginPath();ctx.moveTo(x(0),y(c[0]));c.forEach((v,i)=>ctx.lineTo(x(i),y(v)));
  ctx.lineTo(x(c.length-1),y(0));ctx.lineTo(x(0),y(0));ctx.closePath();
  ctx.fillStyle=c[c.length-1]>=0?'rgba(62,199,123,.12)':'rgba(224,83,59,.12)';ctx.fill();
  // line
  ctx.beginPath();ctx.moveTo(x(0),y(c[0]));c.forEach((v,i)=>ctx.lineTo(x(i),y(v)));
  ctx.strokeStyle=c[c.length-1]>=0?'#3ec77b':'#e0533b';ctx.lineWidth=2.5;ctx.stroke();
}

function calcPos(){
  const a=+$('#ps-acct').value,r=+$('#ps-risk').value,sl=+$('#ps-sl').value,pair=$('#ps-pair').value;
  DB.settings.acct=a;DB.settings.risk=r;save();
  if(!a||!r||!sl){$('#ps-out').textContent='—';return}
  const riskAmt=a*r/100;
  const pipVal=pair.includes('JPY')?0.91:pair==='XAU/USD'?1:1; // ~$ per pip per micro lot baseline
  // standard: pip value per standard lot ≈ $10 (USD quote). lots = risk / (sl * 10)
  const perPipStd=pair==='XAU/USD'?10:pair.includes('JPY')?9.1:10;
  const lots=riskAmt/(sl*perPipStd);
  $('#ps-out').textContent=fmt(lots,2)+' lots';
  $('#ps-sub').innerHTML=`Risking <b>$${fmt(riskAmt,2)}</b> · ${fmt(lots*100000/1000,0)}k units · $${fmt(riskAmt/sl,2)}/pip`;
}
function calcRR(){
  const e=+$('#rr-e').value,s=+$('#rr-s').value,t=+$('#rr-t').value;
  if(!e||!s||!t){$('#rr-out').textContent='—';return}
  const risk=Math.abs(e-s),rew=Math.abs(t-e),rr=rew/risk;
  $('#rr-out').textContent='1 : '+fmt(rr,2);
  $('#rr-out').className='big '+(rr>=2?'pos':rr>=1?'amber':'neg');
  $('#rr-sub').textContent=rr>=2?'Strong setup ✓':rr>=1?'Marginal — want 1:2+':'Below 1:1 — skip it';
}
function calcPL(){

function migratePlans(){

}
function renderPlan(){
  migratePlans();
  if(DB.editingPlan){return renderPlanEdit()}

  const active=DB.plans.find(p=>p.id===DB.activePlan)||DB.plans[0]||null;

  $('#v-plan').innerHTML=`

function runPlan(p){
  const rs=(DB.runState&&DB.runState[p.id])||{};
  const all=p.sections.flatMap(s=>s.items.map(i=>i.id));
  const done=all.filter(id=>rs[id]).length;
  const pct=all.length?Math.round(done/all.length*100):0;
  return `<div class="card" style="border-color:var(--amber-d)">
    <h3>${esc(p.name)} <span class="tag">${done}/${all.length} checked</span></h3>
    <div class="bar" style="margin-bottom:4px"><div style="width:${pct}%;background:${pct===100?'var(--green)':'var(--amber)'}"></div></div>
    <div class="faint mono" style="font-size:11px;margin-bottom:14px">${pct}% complete${pct===100?' · cleared to trade ✓':''}</div>
    ${p.sections.map(s=>`<div class="section-h" style="margin:14px 0 8px">${esc(s.title)}</div>
      ${s.items.map(it=>`<div class="check ${rs[it.id]?'done':''}" onclick="runToggle('${p.id}','${it.id}')">
        <div class="box"><svg viewBox="0 0 24 24" fill="none" stroke="#062013" stroke-width="3"><path d="M5 12l5 5L20 7"/></svg></div>
        <div class="txt">${esc(it.text)}</div></div>`).join('')}`).join('')}
    <button class="btn ghost sm" style="margin-top:12px" onclick="resetRun('${p.id}')">Reset checklist</button>
    <div class="note">A plan you don't follow is a wish. Run it top to bottom before every entry.</div>
   </div>`;
}
function runToggle(pid,iid){DB.runState=DB.runState||{};DB.runState[pid]=DB.runState[pid]||{};DB.runState[pid][iid]=!DB.runState[pid][iid];save();renderPlan()}
function resetRun(pid){if(DB.runState)DB.runState[pid]={};save();renderPlan()}

function planSetName(id,v){const p=DB.plans.find(x=>x.id===id);p.name=v;save()}
function planSetSection(pid,sid,v){const s=DB.plans.find(x=>x.id===pid).sections.find(x=>x.id===sid);s.title=v;save()}
function planSetItem(pid,sid,iid,v){const it=DB.plans.find(x=>x.id===pid).sections.find(x=>x.id===sid).items.find(x=>x.id===iid);it.text=v;save()}
function addSection(pid){DB.plans.find(x=>x.id===pid).sections.push({id:uid(),title:'',items:[{id:uid(),text:''}]});save();renderPlan()}
function delSection(pid,sid){const p=DB.plans.find(x=>x.id===pid);p.sections=p.sections.filter(s=>s.id!==sid);save();renderPlan()}
function addItem(pid,sid){DB.plans.find(x=>x.id===pid).sections.find(x=>x.id===sid).items.push({id:uid(),text:''});save();renderPlan()}
function delItem(pid,sid,iid){const s=DB.plans.find(x=>x.id===pid).sections.find(x=>x.id===sid);s.items=s.items.filter(i=>i.id!==iid);save();renderPlan()}
function donePlan(){
  const p=DB.plans.find(x=>x.id===DB.editingPlan);
  // strip empty items/sections
  p.sections.forEach(s=>s.items=s.items.filter(i=>i.text.trim()));
  p.sections=p.sections.filter(s=>s.title.trim()||s.items.length);
  if(!p.name.trim())p.name='Untitled Plan';
  DB.activePlan=p.id;DB.editingPlan=null;save();renderPlan();
}
function deletePlan(id){DB.plans=DB.plans.filter(p=>p.id!==id);if(DB.activePlan===id)DB.activePlan=DB.plans[0]?DB.plans[0].id:null;DB.editingPlan=null;save();renderPlan()}
