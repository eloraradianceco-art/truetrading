<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>True Balance Trader</title>
<style>
:root{
  --bg:#0a0c0f; --panel:#14191f; --panel2:#1a2127; --line:#28323d; --line-soft:#1e262e;
  --ink:#eaeff4; --dim:#8a98a5; --faint:#5a6772;
  --amber:#e8aa42; --amber-d:#a8782a; --amber-glow:rgba(232,170,66,.14);
  --green:#3ec77b; --green-d:#1f7a4a;
  --red:#e0533b; --red-d:#9a3525;
  --blue:#4a90d9; --violet:#9a7bd0;
  --mono:'SF Mono',ui-monospace,'Cascadia Mono','Roboto Mono',Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,system-ui,sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.25);
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%}
body{
  padding-bottom:80px;
  background:
    radial-gradient(1200px 600px at 50% -5%, rgba(232,170,66,.05), transparent 60%),
    radial-gradient(900px 500px at 100% 100%, rgba(74,144,217,.04), transparent 55%),
    var(--bg);
  background-attachment:fixed;
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
h1,h2,h3,h4{font-weight:650;letter-spacing:-0.015em;line-height:1.2}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
.dim{color:var(--dim)}.faint{color:var(--faint)}
.pos{color:var(--green)}.neg{color:var(--red)}.amber{color:var(--amber)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:10px 12px;width:100%;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-glow)}
label{display:block;font-size:11px;color:var(--dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700}


/* Top bar + session ribbon */
.topbar{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,rgba(10,12,15,.98) 0%,rgba(10,12,15,.92) 100%);backdrop-filter:blur(14px) saturate(1.3);-webkit-backdrop-filter:blur(14px) saturate(1.3);border-bottom:1px solid var(--line-soft);box-shadow:0 1px 0 rgba(255,255,255,.02)}
.brand{display:flex;align-items:center;gap:11px;padding:13px 16px 9px}
.brand .logo{width:32px;height:32px;flex:none;filter:drop-shadow(0 0 8px rgba(232,170,66,.25))}
.brand .t{font-size:16px;font-weight:750;letter-spacing:-0.025em}
.brand .t span{color:var(--amber)}
.brand .clock{margin-left:auto;text-align:right}
.brand .clock .utc{font-family:var(--mono);font-size:15px;font-weight:650;letter-spacing:0.02em}
.brand .clock .lbl{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:0.14em}

/* Session ribbon */
.ribbon{display:flex;height:32px;border-top:1px solid var(--line-soft);position:relative;overflow:hidden}
.ribbon .seg{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;font-size:10px;text-transform:uppercase;letter-spacing:0.12em;font-weight:600;color:var(--faint);border-right:1px solid var(--line-soft);position:relative;transition:all .5s cubic-bezier(.4,0,.2,1)}
.ribbon .seg:last-child{border-right:none}
.ribbon .seg.active{color:#0a0c0f;font-weight:750;text-shadow:0 1px 0 rgba(255,255,255,.15)}
.ribbon .seg.active.asia{background:linear-gradient(180deg,#5ba0e0,var(--blue))}
.ribbon .seg.active.london{background:linear-gradient(180deg,#f0b556,var(--amber))}
.ribbon .seg.active.ny{background:linear-gradient(180deg,#4dd68a,var(--green))}
.ribbon .seg.kz::after{content:'KZ';position:absolute;top:3px;right:5px;font-size:8px;color:var(--amber);font-weight:700}
.ribbon .seg.active.kz::after{color:#0a0c0f}

/* Tabs */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:60;background:linear-gradient(180deg,rgba(20,25,31,.85),rgba(14,17,21,.97));backdrop-filter:blur(16px) saturate(1.3);-webkit-backdrop-filter:blur(16px) saturate(1.3);border-top:1px solid var(--line-soft);display:flex;overflow-x:auto;scrollbar-width:none;padding-bottom:env(safe-area-inset-bottom,0)}
.tabbar::-webkit-scrollbar{display:none}
.tabbar button{flex:1 0 auto;min-width:62px;padding:9px 8px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);font-size:10px;font-weight:600;border-top:2px solid transparent;transition:color .2s,transform .1s}
.tabbar button.on{color:var(--amber);border-top-color:var(--amber)}
.tabbar button.on svg{filter:drop-shadow(0 0 6px var(--amber-glow))}
.tabbar button:active{transform:scale(.92)}
.tabbar button svg{width:21px;height:21px;transition:transform .2s}

/* Layout */
.wrap{max-width:760px;margin:0 auto;padding:16px}
.view{display:none}.view.on{display:block;animation:fade .32s cubic-bezier(.2,0,.2,1)}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{background:linear-gradient(180deg,var(--panel),#11161b);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.card h3{font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:var(--dim);margin-bottom:12px;display:flex;align-items:center;gap:8px;font-weight:700}
.card h3 .tag{margin-left:auto;font-size:10px;color:var(--faint);font-weight:600;letter-spacing:0.04em;text-transform:none}
.row{display:flex;gap:10px}.row>*{flex:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.section-h{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--faint);margin:22px 4px 10px;font-weight:700}

/* Buttons */
.btn{background:linear-gradient(180deg,#f0b556,var(--amber));color:#1a1206;font-weight:700;border-radius:10px;padding:12px 16px;font-size:14px;text-align:center;transition:transform .1s,box-shadow .2s,filter .15s;box-shadow:0 2px 8px rgba(232,170,66,.2)}
.btn:active{transform:scale(.97);filter:brightness(.95)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);font-weight:600;box-shadow:none}
.btn.ghost:active{background:var(--panel2)}
.btn.green{background:linear-gradient(180deg,#4dd68a,var(--green));color:#062013;box-shadow:0 2px 8px rgba(62,199,123,.2)}
.btn.red{background:linear-gradient(180deg,#ec6850,var(--red));color:#2a0a04;box-shadow:0 2px 8px rgba(224,83,59,.2)}
.btn.sm{padding:7px 12px;font-size:13px;box-shadow:none}
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;border:1px solid var(--line);background:var(--panel2);font-size:13px;color:var(--dim);cursor:pointer;user-select:none;transition:all .15s}
.chip:active{transform:scale(.95)}
.chip.on{background:linear-gradient(180deg,#f0b556,var(--amber));color:#1a1206;border-color:var(--amber);font-weight:700}
.chip.on.g{background:var(--green);color:#062013;border-color:var(--green)}
.chip.on.r{background:var(--red);color:#2a0a04;border-color:var(--red)}
.chipwrap{display:flex;flex-wrap:wrap;gap:7px}

/* Stats */
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:linear-gradient(180deg,#1c242c,#161c22);border:1px solid var(--line);border-radius:12px;padding:13px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
.stat .v{font-family:var(--mono);font-size:23px;font-weight:750;line-height:1;letter-spacing:-0.03em}
.stat .l{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:0.08em;margin-top:6px;font-weight:600}

/* Table */
.tlist{display:flex;flex-direction:column;gap:8px}
.trade{background:linear-gradient(180deg,#1b232a,#161c22);border:1px solid var(--line);border-radius:11px;padding:11px 13px;border-left:3px solid var(--faint);transition:transform .1s,border-color .2s}
.trade[onclick]:active{transform:scale(.99)}
.trade.win{border-left-color:var(--green)}.trade.loss{border-left-color:var(--red)}.trade.be{border-left-color:var(--amber)}
.trade .top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.trade .pair{font-weight:700;font-family:var(--mono);letter-spacing:-0.02em}
.trade .dir{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.trade .dir.long{background:var(--green-d);color:#bff5d6}.trade .dir.short{background:var(--red-d);color:#ffcabf}
.trade .r{margin-left:auto;font-family:var(--mono);font-weight:750;font-size:16px;letter-spacing:-0.03em}
.trade .meta{font-size:11px;color:var(--faint);display:flex;gap:10px;flex-wrap:wrap}

/* Reference cards */
.refcard{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:0;margin-bottom:12px;overflow:hidden}
.refcard .head{padding:13px 15px;cursor:pointer;display:flex;align-items:center;gap:10px}
.refcard .head .n{font-weight:700;font-size:15px}
.refcard .head .badge{font-size:10px;padding:3px 8px;border-radius:5px;background:var(--panel);border:1px solid var(--line);color:var(--dim);text-transform:uppercase;letter-spacing:0.05em}
.refcard .head .arr{margin-left:auto;color:var(--faint);transition:transform .2s}
.refcard.open .head .arr{transform:rotate(90deg)}
.refcard .body{display:none;padding:0 15px 16px;border-top:1px solid var(--line)}
.refcard.open .body{display:block}
.refcard .body p{font-size:14px;color:var(--dim);margin:12px 0}
.refcard .body .lead{color:var(--ink);font-weight:500}
.refcard svg{width:100%;height:auto;background:#0a0d10;border:1px solid var(--line);border-radius:8px;margin:8px 0}
.kv{display:flex;gap:8px;font-size:13px;padding:5px 0;border-bottom:1px solid var(--line)}
.kv:last-child{border:none}.kv b{color:var(--amber);min-width:90px;flex:none}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tags .x{font-size:11px;padding:3px 8px;background:var(--panel);border:1px solid var(--line);border-radius:5px;color:var(--dim)}

/* News */
.news-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.news-item:last-child{border:none}
.news-item .imp{width:8px;height:8px;border-radius:50%;flex:none}
.imp.high{background:var(--red)}.imp.med{background:var(--amber)}
.news-item .cc{font-family:var(--mono);font-weight:700;font-size:13px;width:34px;flex:none}
.news-item .ev{flex:1;font-size:14px}
.news-item .ev small{display:block;color:var(--faint);font-size:11px}
.news-item .tm{font-family:var(--mono);font-size:12px;color:var(--dim);text-align:right}

/* Calc result */
.result{background:linear-gradient(135deg,#1a2127,#13181d);border:1px solid var(--amber-d);border-radius:10px;padding:14px;margin-top:12px}
.result .big{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--amber)}
.result .sub{font-size:12px;color:var(--dim);margin-top:4px}

/* Checklist */
.check{display:flex;align-items:flex-start;gap:11px;padding:11px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;margin-bottom:7px;cursor:pointer}
.check .box{width:22px;height:22px;border:2px solid var(--faint);border-radius:6px;flex:none;display:flex;align-items:center;justify-content:center;margin-top:1px}
.check.done .box{background:var(--green);border-color:var(--green)}
.check.done .box svg{display:block}.check .box svg{display:none;width:14px;height:14px}
.check .txt{font-size:14px}.check.done .txt{color:var(--faint)}

.empty{text-align:center;padding:44px 20px;color:var(--faint);line-height:1.6}
.empty svg{width:44px;height:44px;opacity:.35;margin-bottom:14px;stroke:var(--amber)}
.bar{height:8px;background:var(--panel2);border-radius:5px;overflow:hidden;display:flex;box-shadow:inset 0 1px 2px rgba(0,0,0,.3)}
.bar>div{transition:width .5s cubic-bezier(.4,0,.2,1)}
.modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);display:none;align-items:flex-end}
.modal.on{display:flex;animation:fadein .2s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.sheet{background:linear-gradient(180deg,#181e25,var(--panel));border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:18px 16px calc(30px + env(safe-area-inset-bottom,0));animation:up .34s cubic-bezier(.2,0,.2,1);box-shadow:0 -8px 40px rgba(0,0,0,.5);border-top:1px solid var(--line)}
@keyframes up{from{transform:translateY(100%)}}
.sheet .grab{width:38px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 16px}
.note{font-size:12px;color:var(--dim);background:var(--panel2);border-left:3px solid var(--amber);padding:11px 13px;border-radius:0 9px 9px 0;margin:10px 0;line-height:1.55}
canvas{max-width:100%}

/* Boot splash */
#splash{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:radial-gradient(800px 500px at 50% 40%,rgba(232,170,66,.08),transparent 60%),var(--bg);transition:opacity .5s ease,visibility .5s}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none}
#splash .slogo{width:72px;height:72px;animation:splashpulse 2s ease-in-out infinite}
#splash .stitle{font-size:22px;font-weight:750;letter-spacing:-0.03em;opacity:0;animation:splashup .6s .2s forwards}
#splash .stitle span{color:var(--amber)}
#splash .ssub{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:0.22em;opacity:0;animation:splashup .6s .4s forwards}
#splash .sbar{width:120px;height:2px;background:var(--line);border-radius:2px;overflow:hidden;opacity:0;animation:splashup .6s .5s forwards}
#splash .sbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--amber-d),var(--amber));animation:sload 1.1s .5s cubic-bezier(.4,0,.2,1) forwards}
@keyframes splashpulse{0%,100%{filter:drop-shadow(0 0 6px rgba(232,170,66,.2))}50%{filter:drop-shadow(0 0 16px rgba(232,170,66,.45))}}
@keyframes splashup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes sload{from{width:0}to{width:100%}}
@media(prefers-reduced-motion:reduce){#splash .slogo,#splash .stitle,#splash .ssub,#splash .sbar,#splash .sbar i{animation:none;opacity:1}#splash .sbar i{width:100%}}
</style>
</head>

<!-- content injected by app.js below -->
<div class="topbar">

      <circle cx="20" cy="20" r="18" stroke="#e8aa42" stroke-width="2"/>

<div class="wrap">
  <div class="view on" id="v-dash"></div>

<script>
// Fallback loader: if jsDelivr didn't define the library, try unpkg, then a second jsDelivr path.
window.__lwcReady=function(){return typeof LightweightCharts!=='undefined'&&LightweightCharts.createChart;};
(function(){
  var fallbacks=[
    'https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js',
    'https://cdn.jsdelivr.net/npm/lightweight-charts/dist/lightweight-charts.standalone.production.js'
  ];
  function tryNext(i){
    if(window.__lwcReady()||i>=fallbacks.length)return;
    var s=document.createElement('script');
    s.src=fallbacks[i];
    s.onload=function(){};
    s.onerror=function(){tryNext(i+1);};
    document.head.appendChild(s);
    // also advance if it loads but still undefined after a beat
    setTimeout(function(){if(!window.__lwcReady())tryNext(i+1);},1500);
  }
  if(!window.__lwcReady())tryNext(0);
})();
</script>
<script>
/* ============ TRUE BALANCE TRADER ============ */
const LS='tbt_v1';
const DB=load();
function load(){try{return JSON.parse(localStorage.getItem(LS))||seed()}catch(e){return seed()}}
function seed(){return{trades:[],open:[],signals:[],plan:{},checklist:{},settings:{tz:-(new Date().getTimezoneOffset()/60),acct:10000,risk:1}}}
function save(){localStorage.setItem(LS,JSON.stringify(DB))}
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const fmt=(n,d=2)=>Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const uid=()=>Math.random().toString(36).slice(2,9);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---- Pairs & correlation ---- */
const PAIRS=['AUD/USD','NZD/USD','AUD/JPY','AUD/NZD','EUR/USD','GBP/USD','USD/JPY','USD/CAD','USD/CHF','XAU/USD'];
const PIP={'AUD/USD':0.0001,'NZD/USD':0.0001,'EUR/USD':0.0001,'GBP/USD':0.0001,'USD/CAD':0.0001,'USD/CHF':0.0001,'AUD/NZD':0.0001,'AUD/JPY':0.01,'USD/JPY':0.01,'XAU/USD':0.1};
const MODELS=['Silver Bullet','Unicorn','Turtle Soup','Order Block','FVG Entry','Judas Swing','Power of 3','OTE','Liquidity Sweep','Breaker','Other'];
const SESSIONS=['Asia','London','NY AM','NY PM'];
const MISTAKES=['None','FOMO entry','No setup / forced','Moved stop','Revenge trade','Oversized','Early exit','Late entry','Against HTF bias','Traded news spread'];

/* ---- Session clock (UTC based) ---- */
// Killzones (UTC): Asia 23-04, London 07-10 (SB 03-04 NY... using ICT classic), NY AM 12-15 (SB 14-15), NY PM 18-20
const SESS=[
 {k:'asia',n:'Asia',s:23,e:8,kz:[0,4]},
 {k:'london',n:'London',s:7,e:16,kz:[7,10]},
 {k:'ny',n:'New York',s:12,e:21,kz:[14,15]},
];
function tickClock(){
  const now=new Date(); const u=now.getUTCHours()+now.getUTCMinutes()/60;
  $('#clkUtc').textContent=String(now.getUTCHours()).padStart(2,'0')+':'+String(now.getUTCMinutes()).padStart(2,'0');
  const inR=(h,s,e)=>s<e?(h>=s&&h<e):(h>=s||h<e);
  const rib=$('#ribbon'); rib.innerHTML=SESS.map(S=>{
    const act=inR(u,S.s,S.e); const kz=u>=S.kz[0]&&u<S.kz[1];
    return `<div class="seg ${S.k} ${act?'active':''} ${kz&&act?'kz':''}">${S.n}</div>`;
  }).join('');
}
setInterval(tickClock,15000);

/* ============ NEWS CALENDAR (recurring high-impact) ============ */
/* Times in UTC. AUD-relevant: USD, AUD, CNY */
const NEWS_RECUR=[
 {cc:'USD',ev:'Non-Farm Payrolls',note:'1st Friday — biggest USD mover',imp:'high',when:'1st Fri',t:'12:30'},
 {cc:'USD',ev:'CPI (Inflation)',note:'Mid-month — Fed rate driver',imp:'high',when:'~mid-month',t:'12:30'},
 {cc:'USD',ev:'FOMC Rate Decision',note:'8x/yr — highest impact session',imp:'high',when:'8x/year',t:'18:00'},
 {cc:'USD',ev:'Core PCE',note:'Fed preferred inflation gauge',imp:'high',when:'Late month',t:'12:30'},
 {cc:'USD',ev:'Retail Sales',note:'Consumer strength',imp:'med',when:'~mid-month',t:'12:30'},

// SVG helpers for clean candlestick/structure diagrams
function candle(x,o,h,l,c,w=10){
  const up=c<o; const col=up?'#3ec77b':'#e0533b';
  const bt=Math.min(o,c),bb=Math.max(o,c);
  return `<line x1="${x}" y1="${h}" x2="${x}" y2="${l}" stroke="${col}" stroke-width="1.5"/>
  <rect x="${x-w/2}" y="${bt}" width="${w}" height="${Math.max(bb-bt,1.5)}" fill="${col}"/>`;
}
function svgWrap(vb,inner,h=170){return `<svg viewBox="0 0 320 ${h}" preserveAspectRatio="xMidYMid meet">${inner}</svg>`}
function lvl(y,x1,x2,col,dash,lbl){return `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${col}" stroke-width="1" ${dash?'stroke-dasharray="4 3"':''}/>${lbl?`<text x="${x2+2}" y="${y+3}" fill="${col}" font-size="8" font-family="monospace">${lbl}</text>`:''}`}

/* ============ ANALYTICS ENGINE ============ */
function stats(trades){
  const closed=trades.filter(t=>t.outcome!=null);
  const n=closed.length;
  if(!n)return{n:0,wins:0,wr:0,avgR:0,totR:0,pf:0,exp:0,bySession:{},byModel:{},byDay:{},maxDD:0,curve:[0]};
  let wins=0,totR=0,gp=0,gl=0,curve=[0],peak=0,maxDD=0;
  const bySession={},byModel={},byDay={};
  closed.slice().reverse().forEach(t=>{
    const r=Number(t.r)||0; totR+=r; if(r>0){wins++;gp+=r}else{gl+=Math.abs(r)}
    curve.push(+(curve[curve.length-1]+r).toFixed(2));
    peak=Math.max(peak,curve[curve.length-1]); maxDD=Math.max(maxDD,peak-curve[curve.length-1]);
    const acc=(o,k)=>{o[k]=o[k]||{n:0,r:0,w:0};o[k].n++;o[k].r+=r;if(r>0)o[k].w++};
    acc(bySession,t.session||'—'); acc(byModel,t.model||'—');
    acc(byDay,new Date(t.date).toLocaleDateString('en',{weekday:'short'}));
  });
  return{n,wins,wr:wins/n*100,avgR:totR/n,totR,pf:gl?gp/gl:gp,exp:totR/n,bySession,byModel,byDay,maxDD,curve};
}

function breakdown(o){
  const ks=Object.keys(o).sort((a,b)=>o[b].r-o[a].r);
  if(!ks.length)return'<div class="faint">No data yet.</div>';
  return ks.map(k=>{const d=o[k],wr=d.w/d.n*100;
   return `<div style="margin-bottom:10px"><div style="display:flex;font-size:13px;margin-bottom:4px"><span>${esc(k)}</span><span class="mono" style="margin-left:auto;color:${d.r>=0?'var(--green)':'var(--red)'}">${d.r>=0?'+':''}${fmt(d.r,1)}R</span></div>

function drawCurve(c){
  const cv=$('#curve');if(!cv)return; const ctx=cv.getContext('2d');
  const W=cv.width=cv.offsetWidth*2,H=cv.height=300; cv.style.height='150px';
  const mn=Math.min(0,...c),mx=Math.max(0,...c),rng=mx-mn||1,pad=20;
  const x=i=>pad+i/(c.length-1)*(W-pad*2), y=v=>H-pad-(v-mn)/rng*(H-pad*2);
  // zero line
  ctx.strokeStyle='#262f38';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad,y(0));ctx.lineTo(W-pad,y(0));ctx.stroke();
  // fill
  ctx.beginPath();ctx.moveTo(x(0),y(c[0]));c.forEach((v,i)=>ctx.lineTo(x(i),y(v)));
  ctx.lineTo(x(c.length-1),y(0));ctx.lineTo(x(0),y(0));ctx.closePath();
  ctx.fillStyle=c[c.length-1]>=0?'rgba(62,199,123,.12)':'rgba(224,83,59,.12)';ctx.fill();
  // line
  ctx.beginPath();ctx.moveTo(x(0),y(c[0]));c.forEach((v,i)=>ctx.lineTo(x(i),y(v)));
  ctx.strokeStyle=c[c.length-1]>=0?'#3ec77b':'#e0533b';ctx.lineWidth=2.5;ctx.stroke();
}

function calcPos(){
  const a=+$('#ps-acct').value,r=+$('#ps-risk').value,sl=+$('#ps-sl').value,pair=$('#ps-pair').value;
  DB.settings.acct=a;DB.settings.risk=r;save();
  if(!a||!r||!sl){$('#ps-out').textContent='—';return}
  const riskAmt=a*r/100;
  const pipVal=pair.includes('JPY')?0.91:pair==='XAU/USD'?1:1; // ~$ per pip per micro lot baseline
  // standard: pip value per standard lot ≈ $10 (USD quote). lots = risk / (sl * 10)
  const perPipStd=pair==='XAU/USD'?10:pair.includes('JPY')?9.1:10;
  const lots=riskAmt/(sl*perPipStd);
  $('#ps-out').textContent=fmt(lots,2)+' lots';
  $('#ps-sub').innerHTML=`Risking <b>$${fmt(riskAmt,2)}</b> · ${fmt(lots*100000/1000,0)}k units · $${fmt(riskAmt/sl,2)}/pip`;
}
function calcRR(){
  const e=+$('#rr-e').value,s=+$('#rr-s').value,t=+$('#rr-t').value;
  if(!e||!s||!t){$('#rr-out').textContent='—';return}
  const risk=Math.abs(e-s),rew=Math.abs(t-e),rr=rew/risk;
  $('#rr-out').textContent='1 : '+fmt(rr,2);
  $('#rr-out').className='big '+(rr>=2?'pos':rr>=1?'amber':'neg');
  $('#rr-sub').textContent=rr>=2?'Strong setup ✓':rr>=1?'Marginal — want 1:2+':'Below 1:1 — skip it';
}
function calcPL(){
  const pair=$('#pl-pair').value,lots=+$('#pl-lots').value,pips=+$('#pl-pips').value;
  const perPip=(pair==='XAU/USD'?10:pair.includes('JPY')?9.1:10)*lots;
  const pl=perPip*pips;
  $('#pl-out').textContent=(pl>=0?'+':'')+'$'+fmt(pl,2);
  $('#pl-out').className='big '+(pl>=0?'pos':'neg');
}
function calcDD(){
  const l=+$('#dd-in').value;if(!l||l>=100){$('#dd-out').textContent='—';return}
  const g=l/(100-l)*100; $('#dd-out').textContent='+'+fmt(g,1)+'%';
  $('#dd-out').className='big '+(g>l?'neg':'amber');
}
function calcTZ(){
  const off=+$('#tz-in').value;DB.settings.tz=off;save();
  const win=[['Asia KZ',0,4],['London KZ',7,10],['NY AM KZ',12,15],['Silver Bullet',14,15],['NY PM KZ',18,20]];
  $('#tz-out').innerHTML=win.map(w=>{
    const lo=((w[1]+off)%24+24)%24,hi=((w[2]+off)%24+24)%24;
    const f=h=>String(Math.floor(h)).padStart(2,'0')+':'+String(Math.round((h%1)*60)).padStart(2,'0');
    return `<div class="kv"><b>${w[0]}</b><span class="mono">${f(lo)} – ${f(hi)} <span class="faint">local</span></span></div>`;
  }).join('');
}

function migratePlans(){

function runPlan(p){
  const rs=(DB.runState&&DB.runState[p.id])||{};
  const all=p.sections.flatMap(s=>s.items.map(i=>i.id));
  const done=all.filter(id=>rs[id]).length;
  const pct=all.length?Math.round(done/all.length*100):0;
  return `<div class="card" style="border-color:var(--amber-d)">
    <h3>${esc(p.name)} <span class="tag">${done}/${all.length} checked</span></h3>
    <div class="bar" style="margin-bottom:4px"><div style="width:${pct}%;background:${pct===100?'var(--green)':'var(--amber)'}"></div></div>
    <div class="faint mono" style="font-size:11px;margin-bottom:14px">${pct}% complete${pct===100?' · cleared to trade ✓':''}</div>
    ${p.sections.map(s=>`<div class="section-h" style="margin:14px 0 8px">${esc(s.title)}</div>
      ${s.items.map(it=>`<div class="check ${rs[it.id]?'done':''}" onclick="runToggle('${p.id}','${it.id}')">
        <div class="box"><svg viewBox="0 0 24 24" fill="none" stroke="#062013" stroke-width="3"><path d="M5 12l5 5L20 7"/></svg></div>
        <div class="txt">${esc(it.text)}</div></div>`).join('')}`).join('')}
    <button class="btn ghost sm" style="margin-top:12px" onclick="resetRun('${p.id}')">Reset checklist</button>
    <div class="note">A plan you don't follow is a wish. Run it top to bottom before every entry.</div>
   </div>`;
}
function runToggle(pid,iid){DB.runState=DB.runState||{};DB.runState[pid]=DB.runState[pid]||{};DB.runState[pid][iid]=!DB.runState[pid][iid];save();renderPlan()}

/* Realistic AUD/USD random-walk sample so the chart works before the feed is wired */
function sampleCandles(tf,n){
  const sec=(TF.find(t=>t.k===tf)||TF[1]).sec;
  const now=Math.floor(Date.now()/1000); const start=now-sec*n;
  let price=0.6580; const out=[];
  for(let i=0;i<n;i++){
    const t=start+i*sec;
    const drift=Math.sin(i/18)*0.0006 + (Math.random()-0.5)*0.0009;
    const o=price; const c=+(o+drift).toFixed(5);
    const hi=+(Math.max(o,c)+Math.random()*0.0006).toFixed(5);
    const lo=+(Math.min(o,c)-Math.random()*0.0006).toFixed(5);
    out.push({time:t,open:o,high:hi,low:lo,close:c}); price=c;
  }
  return out;
}

/* ============ SIGNAL ENGINE (ICT pattern detection) ============ */
/* Educational pattern detection on completed candles. NOT a predictor.
   Detects: liquidity sweep -> market structure shift (MSS) -> fair value gap (FVG).
   Scans M15 + H1; a signal fires only when both timeframes AGREE on direction.   */

// --- swing point detection: a swing high/low needs `k` lower/higher bars on each side
function swings(c,k){
  const hi=[],lo=[];
  for(let i=k;i<c.length-k;i++){
    let isH=true,isL=true;
    for(let j=1;j<=k;j++){
      if(c[i].high<=c[i-j].high||c[i].high<=c[i+j].high)isH=false;
      if(c[i].low >=c[i-j].low ||c[i].low >=c[i+j].low )isL=false;
    }
    if(isH)hi.push({i,price:c[i].high});
    if(isL)lo.push({i,price:c[i].low});
  }
  return {hi,lo};
}

// --- find a bullish FVG (gap up): candle i-1 high < candle i+1 low. Bearish: i-1 low > i+1 high.
function findFVG(c,fromIdx,dir){
  for(let i=Math.max(fromIdx,1);i<c.length-1;i++){
    if(dir==='long' && c[i-1].high < c[i+1].low)
      return {top:c[i+1].low, bottom:c[i-1].high, idx:i};
    if(dir==='short' && c[i-1].low > c[i+1].high)
      return {top:c[i-1].low, bottom:c[i+1].high, idx:i};
  }
  return null;
}

// --- core detection on one candle series. Returns a setup object or null.
function detectSetup(c){
  if(!c||c.length<40)return null;
  const k=2;
  const sw=swings(c,k);
  const recent=c.length-1;
  const lookback=Math.min(c.length,80);
  const startI=c.length-lookback;
  const lastClose=c[recent].close;

  // SHORT: find a prior swing HIGH that a LATER bar wicked above (sweep) then price closed back below,
  // with a bearish FVG in the displacement, and the latest close still below that level.
  // Iterate most-recent prior swings first.
  const hiCands=sw.hi.filter(s=>s.i>=startI && s.i<=recent-3).reverse();
  for(const ph of hiCands){
    // a sweep bar after ph whose HIGH exceeds ph.price
    let sweepIdx=-1;
    for(let i=ph.i+1;i<=recent;i++){ if(c[i].high>ph.price){sweepIdx=i;break;} }
    if(sweepIdx<0)continue;
    // after the sweep, a bar that CLOSES back below ph.price (rejection / start of MSS)
    let rejIdx=-1;
    for(let i=sweepIdx;i<=recent;i++){ if(c[i].close<ph.price){rejIdx=i;break;} }
    if(rejIdx<0)continue;
    const fvg=findFVG(c,sweepIdx,'short');
    if(fvg && fvg.idx>sweepIdx-1 && lastClose<ph.price){
      return mkSetup('short',ph.price,fvg,c);
    }
  }
  // LONG: mirror — prior swing LOW wicked below then close back above + bullish FVG.
  const loCands=sw.lo.filter(s=>s.i>=startI && s.i<=recent-3).reverse();
  for(const pl of loCands){
    let sweepIdx=-1;
    for(let i=pl.i+1;i<=recent;i++){ if(c[i].low<pl.price){sweepIdx=i;break;} }
    if(sweepIdx<0)continue;
    let rejIdx=-1;
    for(let i=sweepIdx;i<=recent;i++){ if(c[i].close>pl.price){rejIdx=i;break;} }
    if(rejIdx<0)continue;
    const fvg=findFVG(c,sweepIdx,'long');
    if(fvg && fvg.idx>sweepIdx-1 && lastClose>pl.price){
      return mkSetup('long',pl.price,fvg,c);
    }
  }
  return null;
}

function mkSetup(dir,sweptLevel,fvg,c){
  const last=c[c.length-1];
  const entry=(fvg.top+fvg.bottom)/2;            // mid of FVG (consequent encroachment)
  let sl,tp;
  if(dir==='short'){
    sl=sweptLevel + (sweptLevel-entry)*0.1 + (fvg.top-fvg.bottom); // just above swept high / fvg
    sl=Math.max(sweptLevel, fvg.top);
    const risk=sl-entry;
    tp=entry - risk*2;                            // 1:2
  }else{
    sl=Math.min(sweptLevel, fvg.bottom);
    const risk=entry-sl;
    tp=entry + risk*2;
  }
  const risk=Math.abs(entry-sl);
  const rr=risk>0?Math.abs(tp-entry)/risk:0;
  return {dir,sweptLevel,entry,sl,tp,rr,fvgTop:fvg.top,fvgBottom:fvg.bottom,lastClose:last.close,lastTime:last.time};
}

// --- run on both TFs and require agreement
async function scanSignals(){
  if(DATA_SOURCE!=='supabase'||!SUPA_FN)return null;
  let m15,h1;
  try{
    m15=await fetchCandles('AUD_USD','M15',120);
    h1 =await fetchCandles('AUD_USD','H1',120);
  }catch(e){return null;}
  if(!Array.isArray(m15)||!Array.isArray(h1))return null;
  const sM=detectSetup(m15), sH=detectSetup(h1);
  if(!sM||!sH)return null;
  if(sM.dir!==sH.dir)return null;                 // require alignment
  // grade by how well levels align + R
  let grade='B';
  if(sM.rr>=2 && sH.rr>=2)grade='A';
  if(sM.rr<1.5)grade='C';
  return {
    dir:sM.dir, grade,
    m15:sM, h1:sH,
    primary:sM,                                   // execute on M15
    detectedAt:Date.now(),
    bar:sM.lastTime,
  };
}

// --- dedupe + log. Key on STRUCTURAL identity (dir + swept level + entry zone),
// NOT the moving last-bar time, so the same setup isn't re-logged every refresh.
function signalKey(sig){
  const s=sig.primary;
  return sig.dir+'_swept'+s.sweptLevel.toFixed(4)+'_e'+s.entry.toFixed(4);
}
async function runSignalEngine(){
  const sig=await scanSignals();
  const box=$('#signalBox');
  if(!sig){ if(box)box.innerHTML='<div class="faint" style="font-size:13px">No aligned M15 + H1 setup right now. The engine is watching.</div>'; return; }
  // log if new — guard against exact key match AND near-identical recent setups
  DB.signals=DB.signals||[];
  const key=signalKey(sig);
  const now=sig.detectedAt;
  const pip=0.0010; // within ~10 pips of entry + same direction within 6h = treat as the same setup
  const dup=DB.signals.some(s=>
    s.key===key ||
    (s.dir===sig.dir && Math.abs(s.entry-sig.primary.entry)<pip && (now-s.ts)<6*3600*1000)
  );
  if(!dup){
    DB.signals.unshift({
      id:uid(), key, dir:sig.dir, grade:sig.grade,
      entry:sig.primary.entry, sl:sig.primary.sl, tp:sig.primary.tp, rr:sig.primary.rr,
      sweptLevel:sig.primary.sweptLevel, ts:sig.detectedAt, outcome:null,
    });
    if(DB.signals.length>200)DB.signals.length=200;
    save();
  }
  if(box)box.innerHTML=signalCard(sig);
}

 <div class="kv"><b>Classic Buy/Sell Day</b><span>Wide trend day (often Mon–Wed). NY retraces then continues London's trend</span></div>
 <div class="kv"><b>Range→NY Rally</b><span>Consolidation into a London-close / NY directional run</span></div>
 <div class="kv"><b>Consolidation Raid on News</b><span>Pre-news chop → spike to grab stops → true move. NFP/FOMC days</span></div>
 <div class="kv"><b>Seek & Destroy</b><span>Both-side stop raids, choppy. Pre-news / EQ of HTF range — often skip</span></div>
